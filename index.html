<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>NOMINA AD</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#030303;--bg1:#090909;--bg2:#101010;--bg3:#181818;--bg4:#202020;
  --gold:#c9a84c;--gold2:#e8c96d;--gold3:#a07830;--gold4:#f5e6b8;
  --goldg:linear-gradient(135deg,#c9a84c,#e8c96d,#a07830);
  --goldgs:linear-gradient(90deg,#c9a84c,#e8c96d);
  --ok:#4caf7d;--danger:#c0392b;--warn:#e6a817;
  --txt0:#f5f0e8;--txt1:#8a7d6a;--txt2:#4a4035;
  --border:#1e1a14;--border2:#2a2318;
  --font:'Inter',sans-serif;--display:'Cormorant Garamond',serif;--mono:'JetBrains Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --tab-h:60px;
  --top-h:56px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);font-family:var(--font);color:var(--txt0);overscroll-behavior:none}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .25s ease}

/* ══ LAYOUT MOBILE ══ */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bot);
}

/* ── TOPBAR ── */
#topbar{
  height:var(--top-h);flex-shrink:0;
  background:var(--bg1);border-bottom:1px solid var(--border2);
  display:flex;align-items:center;padding:0 16px;gap:10px;
  position:relative;z-index:30;
}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)50,transparent)}
.tb-brand{font-family:var(--display);font-size:20px;font-weight:700;letter-spacing:3px;background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200%;animation:shimmer 4s linear infinite}
.tb-month{display:flex;align-items:center;gap:4px;margin-left:auto}
.tb-month button{background:var(--bg3);border:1px solid var(--border2);color:var(--txt1);border-radius:6px;width:28px;height:28px;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.tb-month button:active{background:var(--gold)22;border-color:var(--gold)}
.tb-mlabel{font-size:11px;font-weight:600;font-family:var(--mono);color:var(--gold);min-width:90px;text-align:center;letter-spacing:.5px}
.tb-icon{width:36px;height:36px;background:var(--bg3);border:1px solid var(--border2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;cursor:pointer;flex-shrink:0}
.tb-icon:active{background:var(--gold)22;border-color:var(--gold)}

/* ── CONTENT AREA ── */
#content-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:8px;
}
.page{padding:12px;animation:fadeUp .2s ease}

/* ── BOTTOM TABS ── */
#tabs{
  height:var(--tab-h);flex-shrink:0;
  background:var(--bg1);border-top:1px solid var(--border2);
  display:flex;align-items:stretch;
  position:relative;z-index:30;
}
#tabs::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)50,transparent)}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:2px;border:none;background:none;cursor:pointer;
  font-size:9px;color:var(--txt2);font-family:var(--font);font-weight:500;
  letter-spacing:.3px;transition:color .15s;padding:6px 2px;
}
.tab-btn .ti{font-size:20px;line-height:1}
.tab-btn.active{color:var(--gold)}
.tab-btn.active .ti{filter:drop-shadow(0 0 4px var(--gold)44)}

/* ── CARDS ── */
.card{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:14px;position:relative;overflow:hidden;margin-bottom:10px}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)30,transparent)}
.csm{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.stat-card{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:12px 14px;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)40,transparent)}
.slabel{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:600}
.sval{font-size:18px;font-weight:700;font-family:var(--mono)}
.ssub{font-size:10px;color:var(--txt2);margin-top:2px}

/* ── PAY CARDS ── */
.pay-card{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.pay-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)50,transparent)}
.pbar{background:var(--bg4);border-radius:99px;height:3px;margin-top:8px}
.pfill{height:100%;border-radius:99px;transition:width .5s}

/* ── EMP CARDS ── */
.emp-card{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:8px;position:relative;overflow:hidden}
.emp-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)20,transparent)}
.emp-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.emp-actions{display:flex;gap:6px;margin-top:10px}
.ea-btn{flex:1;height:32px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--txt1);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:var(--font);font-weight:500}
.ea-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── CHECK BUTTON ── */
.cbtn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);font-weight:700;transition:all .15s;flex-shrink:0}
.cbtn.paid{background:var(--ok)22;border-color:var(--ok);color:var(--ok)}
.cbtn:active{transform:scale(.92)}

/* ── MODAL BOTTOM SHEET ── */
.bsheet-overlay{position:fixed;inset:0;background:#000000aa;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(4px)}
.bsheet{background:var(--bg1);border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;padding-bottom:calc(20px + var(--safe-bot))}
.bsheet::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--goldgs);border-radius:20px 20px 0 0}
.bsheet-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 4px}
.bsheet-hdr{padding:8px 18px 0;display:flex;align-items:center;justify-content:space-between}
.bsheet-hdr h3{font-size:15px;font-weight:700;letter-spacing:.3px}
.bsheet-body{padding:14px 18px}
.bsheet-foot{padding:0 18px;display:flex;gap:8px;margin-top:4px}

/* ── FORMS ── */
.fg{margin-bottom:12px}
.fl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;display:block;font-weight:600}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;color:var(--txt0);padding:10px 12px;font-size:15px;outline:none;font-family:var(--font);-webkit-appearance:none;appearance:none}
.fi:focus{border-color:var(--gold3)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fhint{font-size:11px;color:var(--txt1);margin-top:5px;padding:8px 12px;background:var(--bg2);border-radius:6px;border-left:2px solid var(--gold3);font-family:var(--mono);line-height:1.6}

/* ── BUTTONS ── */
.btn-gold{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--gold3);font-family:var(--font);background:var(--goldgs);color:#000;letter-spacing:.3px;width:100%}
.btn-gold:active{opacity:.85;transform:scale(.98)}
.btn-sec{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border2);font-family:var(--font);background:var(--bg2);color:var(--txt1);width:100%}
.btn-sec:active{border-color:var(--gold3);color:var(--gold)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px;width:auto}
.btn-icon{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0}
.btn-icon:active{border-color:var(--gold3);color:var(--gold)}
.btn-danger{border-color:var(--danger)44!important;color:var(--danger)!important}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.4px}
.cok{background:var(--ok)18;color:var(--ok);border:1px solid var(--ok)33}
.cwn{background:var(--warn)18;color:var(--warn);border:1px solid var(--warn)33}
.cdn{background:var(--danger)18;color:var(--danger);border:1px solid var(--danger)33}
.cinf{background:var(--gold3)18;color:var(--gold2);border:1px solid var(--gold3)33}
.cne{background:var(--bg3);color:var(--txt2);border:1px solid var(--border2)}
.cfem{background:var(--gold)15;color:var(--gold2);border:1px solid var(--gold3)33}

/* ── MINI CAL ── */
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.chd{text-align:center;font-size:9px;color:var(--txt2);font-weight:700;padding:2px;letter-spacing:1px}
.cc{text-align:center;padding:5px 2px;border-radius:5px;font-size:11px}
.cc.pay{background:var(--goldgs);color:#000;font-weight:700}
.cc.tod{background:var(--bg3);color:var(--gold2);font-weight:700;border:1px solid var(--gold3)44}
.cc.hol{color:var(--danger)}
.cc.wkd{color:var(--txt2)}
.cc.wkk{color:var(--txt1)}

/* ── CALCULATOR ── */
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.calc-btn{height:52px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--txt0);font-size:17px;font-weight:600;cursor:pointer;font-family:var(--mono);display:flex;align-items:center;justify-content:center}
.calc-btn:active{background:var(--bg3);transform:scale(.95)}
.calc-btn.op{background:var(--gold)18;color:var(--gold);border-color:var(--gold3)44}
.calc-btn.op:active{background:var(--gold)30}
.calc-btn.eq{background:var(--goldgs);color:#000;border-color:var(--gold)}
.calc-btn.eq:active{opacity:.85}
.calc-btn.clr{background:var(--danger)18;color:var(--danger);border-color:var(--danger)44}
.calc-display{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:var(--mono);margin-bottom:6px}
.calc-expr{font-size:12px;color:var(--txt2);min-height:16px;word-break:break-all}
.calc-result{font-size:26px;font-weight:700;color:var(--gold);text-align:right;word-break:break-all}

/* ── NOTIF ── */
#nwrap{position:fixed;top:calc(var(--top-h) + var(--safe-top) + 8px);left:8px;right:8px;z-index:100;display:flex;flex-direction:column;gap:6px}
.notif{background:var(--bg2);border:1px solid var(--gold3)55;border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;animation:slideIn .3s ease;box-shadow:0 4px 20px #000a}
.nclose{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:16px;padding:0;flex-shrink:0}

/* ── CONN ── */
#conn-badge{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 8px);right:8px;z-index:50;display:none;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--border2);border-radius:99px;padding:4px 10px;font-size:10px;font-family:var(--mono)}
.conn-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.conn-dot.online{background:var(--ok);animation:pulse 2s infinite}
.conn-dot.offline{background:var(--danger)}
.conn-dot.syncing{background:var(--gold);animation:pulse .8s infinite}

/* ── SETUP SCREEN ── */
#setup-screen{position:fixed;inset:0;background:var(--bg0);z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.setup-box{width:100%;max-width:420px}
.setup-title{font-family:var(--display);font-size:42px;font-weight:700;letter-spacing:5px;background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200%;animation:shimmer 4s linear infinite;text-align:center;margin-bottom:4px}
.setup-sub{font-size:9px;color:var(--gold3);letter-spacing:6px;text-transform:uppercase;text-align:center;margin-bottom:32px}
.setup-hint{font-size:11px;color:var(--txt2);line-height:1.7;margin-top:6px;padding:10px 12px;background:var(--bg2);border-radius:8px;border-left:2px solid var(--gold3)}

/* ── STITLE ── */
.stitle{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:10px}
.empty{text-align:center;padding:40px 20px;color:var(--txt2);font-size:13px}

/* ── DIVIDER ── */
.gdiv{height:1px;background:linear-gradient(90deg,transparent,var(--gold3)50,transparent);margin:12px 0}

/* ── DESCUENTO / ADELANTO ITEMS ── */
.disc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.disc-item:last-child{border-bottom:none}

/* ── WA PREVIEW ── */
.wa-preview{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:var(--mono);font-size:12px;color:var(--txt1);line-height:1.8;white-space:pre-wrap;word-break:break-word;margin-top:10px;max-height:280px;overflow-y:auto}

@media(min-width:768px){
  /* PC: sidebar lateral + contenido */
  #app{flex-direction:row;align-items:stretch}
  #tabs{
    flex-direction:column;width:72px;height:auto;
    border-top:none;border-right:1px solid var(--border2);
    order:-1;flex-shrink:0;
  }
  #tabs::before{display:none}
  .tab-btn{flex-direction:column;gap:4px;padding:14px 4px;font-size:9px;border-right:none;border-left:3px solid transparent}
  .tab-btn.active{border-left-color:var(--gold);border-bottom:none;background:var(--gold)12}
  .tab-btn .ti{font-size:22px}
  #topbar{padding:12px 20px}
  #content-area{flex:1;min-width:0}
  #conn-badge{left:82px}
}
@media(min-width:1024px){
  #tabs{width:90px}
  .tab-btn{font-size:10px;padding:16px 4px}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="setup-screen">
  <div class="setup-box">
    <div class="setup-title">NOMINA AD</div>
    <div class="setup-sub">Gestión de Sueldos</div>
    <div id="login-form">
      <div class="fg"><label class="fl">Email</label><input class="fi" id="auth-email" type="email" placeholder="tumail@email.com" autocomplete="email" style="font-size:15px"></div>
      <div class="fg"><label class="fl">Contraseña</label>
        <div style="position:relative">
          <input class="fi" id="auth-pass" type="password" placeholder="Ingresa tu contraseña" autocomplete="current-password" style="font-size:15px;padding-right:44px">
          <button onclick="togglePassVis()" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--txt2);cursor:pointer;font-size:18px" id="pass-eye">👁</button>
        </div>
      </div>
      <div style="margin-top:20px;display:flex;flex-direction:column;gap:8px">
        <button class="btn-gold" onclick="doLogin()">Entrar →</button>
        <button class="btn-sec" onclick="showRegister()">Crear cuenta nueva</button>
        <button onclick="doResetPass()" style="background:none;border:none;color:var(--txt2);font-size:12px;cursor:pointer;padding:4px;font-family:var(--font)">¿Olvidaste tu contraseña?</button>
      </div>
      <div id="setup-err" style="display:none;margin-top:10px;padding:10px;background:var(--danger)15;border:1px solid var(--danger)44;border-radius:8px;font-size:12px;color:var(--danger)"></div>
    </div>
    <div id="register-form" style="display:none">
      <div style="font-size:12px;color:var(--txt2);margin-bottom:14px;line-height:1.6;padding:10px;background:var(--bg2);border-radius:8px;border-left:2px solid var(--gold3)">Solo los administradores pueden crear cuentas nuevas.</div>
      <div class="fg"><label class="fl">Nombre</label><input class="fi" id="reg-name" placeholder="Juan Pérez" style="font-size:15px"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="reg-email" type="email" placeholder="empleado@email.com" style="font-size:15px"></div>
      <div class="fg"><label class="fl">Contraseña</label><input class="fi" id="reg-pass" type="password" placeholder="Mínimo 6 caracteres" style="font-size:15px"></div>
      <div class="fg"><label class="fl">Rol</label>
        <select class="fi" id="reg-role" style="appearance:none;font-size:14px">
          <option value="admin">👑 Administrador — edita todo</option>
          <option value="viewer">👁 Solo lectura</option>
        </select>
      </div>
      <div style="margin-top:14px;display:flex;gap:8px">
        <button class="btn-sec" style="flex:1" onclick="showLogin()">← Volver</button>
        <button class="btn-gold" style="flex:2" onclick="doRegister()">Crear cuenta</button>
      </div>
      <div id="reg-err" style="display:none;margin-top:8px;padding:8px;background:var(--danger)15;border:1px solid var(--danger)44;border-radius:8px;font-size:12px;color:var(--danger)"></div>
      <div id="reg-ok" style="display:none;margin-top:8px;padding:8px;background:var(--ok)15;border:1px solid var(--ok)44;border-radius:8px;font-size:12px;color:var(--ok)"></div>
    </div>
    <input type="hidden" id="fb-url">
    <input type="hidden" id="fb-room">
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <div id="nwrap"></div>
  <div id="conn-badge"><div class="conn-dot syncing" id="conn-dot"></div><span id="conn-label" style="color:var(--txt1)">Conectando...</span></div>

  <!-- TOPBAR -->
  <div id="topbar">
    <div class="tb-brand">NAD</div>
    <div class="tb-month">
      <button onclick="prevMonth()">‹</button>
      <div class="tb-mlabel" id="mlabel"></div>
      <button onclick="nextMonth()">›</button>
    </div>
    <div class="tb-icon" onclick="openSearch()">🔍</div>
    <div class="tb-icon" onclick="openAddEmp()" id="btn-add-emp">+</div>
    <div class="tb-icon" onclick="doLogout()" title="Cerrar sesión" style="font-size:14px">🚪</div>
  </div>

  <!-- CONTENT -->
  <div id="content-area"></div>

  <!-- BOTTOM TABS -->
  <div id="tabs">
    <button class="tab-btn active" data-tab="dashboard" onclick="setTab('dashboard')"><div class="ti">📊</div><div>Inicio</div></button>
    <button class="tab-btn" data-tab="calendario" onclick="setTab('calendario')"><div class="ti">📅</div><div>Pagos</div></button>
    <button class="tab-btn" data-tab="empleados" onclick="setTab('empleados')"><div class="ti">👥</div><div>Equipo</div></button>
    <button class="tab-btn" data-tab="horas" onclick="setTab('horas')"><div class="ti">⏱️</div><div>Extras</div></button>
    <button class="tab-btn" data-tab="calc" onclick="setTab('calc')"><div class="ti">🧮</div><div>Calc</div></button>
    <button class="tab-btn" data-tab="mas" onclick="setTab('mas')"><div class="ti">☰</div><div>Más</div></button>
  </div>
</div>

<!-- BOTTOM SHEET -->
<div id="bsheet-overlay" style="display:none" onclick="closeBSOutside(event)">

// ── CONSTANTES ──
const HOLIDAYS=new Set(["2025-01-01","2025-03-03","2025-03-04","2025-04-02","2025-04-18","2025-05-01","2025-05-25","2025-06-16","2025-06-20","2025-07-09","2025-08-17","2025-10-12","2025-11-20","2025-12-08","2025-12-25","2026-01-01","2026-02-16","2026-02-17","2026-04-02","2026-04-03","2026-05-01","2026-05-25","2026-06-15","2026-06-20","2026-07-09","2026-08-17","2026-10-12","2026-11-20","2026-12-08","2026-12-25"]);
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DSHORT=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const COLORS=["#c9a84c","#e8c96d","#a07830","#d4a853","#b8963e","#f0d060","#967028","#deb84a","#c09038","#e0c058"];
const pad=n=>String(n).padStart(2,"0");
const toKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const isHol=d=>HOLIDAYS.has(toKey(d));
const isWork=d=>d.getDay()!==0&&d.getDay()!==6&&!isHol(d);
const TODAY=new Date();TODAY.setHours(0,0,0,0);

function getPayDate(y,m,q){
  const s=q===1?1:16,e=q===1?15:new Date(y,m+1,0).getDate();
  let n=0;
  for(let d=s;d<=e;d++){const dt=new Date(y,m,d);if(isWork(dt)){n++;if(n===4)return dt;}}
  return null;
}
const fmtD=d=>d?`${DSHORT[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`:"—";
const dUntil=d=>d?Math.round((d-TODAY)/86400000):null;
const $=n=>(n===null||n===undefined||isNaN(n))?"—":"$"+Math.round(n).toLocaleString("es-AR");

// Días desde ingreso
function diasDesdeIngreso(fechaIngreso){
  if(!fechaIngreso)return null;
  const fi=new Date(fechaIngreso);
  return Math.floor((TODAY-fi)/86400000);
}

function calc(emp){
  const base=parseFloat(emp.salary)||0;
  const hm=parseInt(emp.horasMes)||160;
  const dias=Math.min(parseInt(emp.diasTrab)||30,30);
  const vac=parseInt(emp.vacDias)||0;
  const diario=base/30;
  const valorHora=base/hm;
  const diasEfect=dias-vac;
  const proporcional=diario*diasEfect;
  const totalExtras=(emp.extras||[]).reduce((s,ex)=>s+valorHora*(parseFloat(ex.horas)||0),0);
  // Adelantos y descuentos que afectan a la próxima quincena
  const adelantos=(emp.adelantos||[]).filter(a=>!a.cobrado).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
  const descuentos=(emp.descuentos||[]).filter(d=>!d.cobrado).reduce((s,d)=>s+(parseFloat(d.monto)||0),0);
  const totalBruto=proporcional+totalExtras;
  const quincenaBase=totalBruto/2;
  const quincenaFinal=Math.max(0,quincenaBase-adelantos-descuentos);
  return{base,diario,valorHora,dias,diasEfect,vac,proporcional,totalExtras,totalBruto,quincenaBase,quincenaFinal,adelantos,descuentos};
}

function showLogin(){document.getElementById("login-form").style.display="block";document.getElementById("register-form").style.display="none";}

async function doLogin(){
  const email=document.getElementById("auth-email").value.trim();
  const pass=document.getElementById("auth-pass").value;
  const errEl=document.getElementById("setup-err");errEl.style.display="none";
  if(!email||!pass){errEl.textContent="Completá email y contraseña";errEl.style.display="block";return;}
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){
    const m={"auth/invalid-credential":"Email o contraseña incorrectos.","auth/user-not-found":"No existe esa cuenta.","auth/wrong-password":"Contraseña incorrecta.","auth/too-many-requests":"Demasiados intentos. Esperá unos minutos."};
    errEl.textContent=m[e.code]||"Error: "+e.message;errEl.style.display="block";
  }
}
window.doLogin=doLogin;

async function doRegister(){
  const name=document.getElementById("reg-name").value.trim();
  const email=document.getElementById("reg-email").value.trim();
  const pass=document.getElementById("reg-pass").value;
  const role=document.getElementById("reg-role").value;
  const errEl=document.getElementById("reg-err"),okEl=document.getElementById("reg-ok");
  errEl.style.display="none";okEl.style.display="none";
  if(!name||!email||!pass){errEl.textContent="Completá todos los campos";errEl.style.display="block";return;}
  if(pass.length<6){errEl.textContent="La contraseña necesita al menos 6 caracteres";errEl.style.display="block";return;}
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await set(ref(db,"nomina/"+ROOM+"/users/"+cred.user.uid),{name,email,role,createdAt:Date.now()});
    okEl.textContent="Cuenta creada para "+name+". Ya puede iniciar sesión.";okEl.style.display="block";
    document.getElementById("reg-name").value="";document.getElementById("reg-email").value="";document.getElementById("reg-pass").value="";
  }catch(e){
    const m={"auth/email-already-in-use":"Ya existe una cuenta con ese email.","auth/weak-password":"Contraseña muy débil.","auth/invalid-email":"Email inválido."};
    errEl.textContent=m[e.code]||"Error: "+e.message;errEl.style.display="block";
  }
}
window.doRegister=doRegister;

async function doResetPass(){
  const email=document.getElementById("auth-email").value.trim();
  const errEl=document.getElementById("setup-err");
  if(!email){errEl.textContent="Ingresá tu email primero";errEl.style.display="block";return;}

  db=getDatabase(app);auth=getAuth(app);

    if(user){
      currentUser=user;
      // Leer rol
      onValue(ref(db,"nomina/"+ROOM+"/users/"+user.uid),(snap)=>{
        const data=snap.val()||{};
        currentRole=data.role||"admin";
        if(!snap.val()){
          // primer usuario = admin automáticamente
          set(ref(db,"nomina/"+ROOM+"/users/"+user.uid),{name:user.email,email:user.email,role:"admin",createdAt:Date.now()});
          currentRole="admin";
        }
        roomRef=ref(db,"nomina/"+ROOM);
        iniciarSync();
      },{onlyOnce:true});
    }else{
      document.getElementById("setup-screen").style.display="flex";
      document.getElementById("app").style.display="none";
      _loaded=false;
    }
  });
});

    const data=snap.val();

      });return;

async function fbSet(path,val){
  if(currentRole!=="admin"){toast("⚠ Solo los administradores pueden modificar datos");return;}
  setConn("syncing","Guardando...");await set(ref(db,`nomina/${ROOM}/${path}`),val);setConn("online","● "+ROOM);
}

// ── STATE ──
const mk=(id,q)=>`${S.viewY}_${S.viewM}_${id}_${q}`;
const isPaid=(id,q)=>!!S.paid[mk(id,q)];

async function togglePaid(id,q){
  const was=S.paid[mk(id,q)];
  const emp=S.employees.find(e=>e.id===id);
  const c=calc(emp);
  const lbl=`${q===1?"1ra":"2da"} Quincena — ${MONTHS[S.viewM]} ${S.viewY}`;
  const newPaid={...S.paid,[mk(id,q)]:!was};
  let newHist=[...(S.historial||[])];
  if(!was){
    newHist.unshift({empId:id,empName:emp.name,empColor:emp.color,concepto:lbl,bruto:c.quincenaBase,adelantos:c.adelantos,descuentos:c.descuentos,neto:c.quincenaFinal,fecha:TODAY.toLocaleDateString("es-AR"),_ts:Date.now()});
    // Marcar adelantos y descuentos como cobrados
    const updEmps=S.employees.map(e=>e.id===id?{...e,
      adelantos:(e.adelantos||[]).map(a=>({...a,cobrado:true})),
      descuentos:(e.descuentos||[]).map(d=>({...d,cobrado:true})),
    }:e);
    await fbSet("employees",updEmps);
  }else{newHist=newHist.filter(h=>!(h.empId===id&&h.concepto===lbl));}
  await set(ref(db,`nomina/${ROOM}/paid`),newPaid);
  await set(ref(db,`nomina/${ROOM}/historial`),newHist.length?newHist:{});
}
window.togglePaid=togglePaid;

const actEmps=()=>{
  let l=(S.employees||[]).filter(e=>!e.hidden);
  if(S.search){const q=S.search.toLowerCase();l=l.filter(e=>e.name.toLowerCase().includes(q)||(e.position||"").toLowerCase().includes(q));}
  return l;
};

function chipD(days,paid){
  if(paid)return`<span class="chip cok">✓ Cobrado</span>`;
  if(days===null)return"";
  if(days<0)return`<span class="chip cdn">Vencido</span>`;
  if(days===0)return`<span class="chip cwn">¡HOY!</span>`;
  if(days<=5)return`<span class="chip cwn">${days}d</span>`;
  return`<span class="chip cinf">${days}d</span>`;
}

function renderNotifs(){
  const p1=getPayDate(S.viewY,S.viewM,1),p2=getPayDate(S.viewY,S.viewM,2);
  let h="";
  [{d:dUntil(p1),dt:p1,lb:"1ra Quincena"},{d:dUntil(p2),dt:p2,lb:"2da Quincena"}].forEach(({d,dt,lb})=>{
    if(d!==null&&d>=0&&d<=2){
      const k=(dt?toKey(dt):"")+lb;
      if(!S.dismissedN.has(k)){
        h+=`<div class="notif"><div style="color:var(--gold);font-size:16px">◈</div>
          <div style="flex:1"><div style="font-size:11px;font-weight:700;color:var(--gold)">${d===0?"¡DÍA DE PAGO!":"Pago en "+d+" día"+(d!==1?"s":"")}</div>
          <div style="font-size:11px;color:var(--txt1)">${lb} — ${fmtD(dt)}</div></div>
          <button class="nclose" onclick="dimN('${k}')">×</button></div>`;
      }
    }
  });
  document.getElementById("nwrap").innerHTML=h;
}
function dimN(k){S.dismissedN.add(k);renderNotifs();}

let calcExpr="",calcDisp="0";
function vCalc(){
  return`<div class="page fade-up">
    <div class="card" style="margin-bottom:10px">
      <div class="stitle">Calculadora</div>
      <div class="calc-display">
        <div class="calc-expr" id="calc-expr">${calcExpr||""}</div>
        <div class="calc-result" id="calc-disp">${calcDisp}</div>
      </div>
      <div class="calc-grid">
        ${[
          ["C","","","⌫"],
          ["%","","","÷"],
          ["7","8","9","×"],
          ["4","5","6","−"],
          ["1","2","3","+"],
          ["+/−","0",".",  "="],
        ].map(row=>row.map((k,ki)=>{
          const isOp=["%","÷","×","−","+"].includes(k);
          const isEq=k==="=";
          const isClr=k==="C";
          const isDel=k==="⌫";
          let cls="calc-btn"+(isOp?" op":isEq?" eq":isClr?" clr":"");
          return`<button class="${cls}" ${ki===0&&isClr?'style="grid-column:span 1"':""} onclick="calcPress('${k}')">${k}</button>`;
        }).join("")).join("")}
      </div>
    </div>
    <div class="card">
      <div class="stitle">Calculadora de sueldo</div>
      <div class="fg"><label class="fl">Sueldo mensual ($)</label><input class="fi" id="cs-sal" type="number" placeholder="Ej: 200000" oninput="updateSueldoCalc()"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Horas/mes pactadas</label><input class="fi" id="cs-hm" type="number" value="160" oninput="updateSueldoCalc()"></div>
        <div class="fg"><label class="fl">Días trabajados</label><input class="fi" id="cs-dt" type="number" value="30" min="1" max="30" oninput="updateSueldoCalc()"></div>
      </div>
      <div class="fg"><label class="fl">Horas extra</label><input class="fi" id="cs-he" type="number" value="0" step="0.5" oninput="updateSueldoCalc()"></div>
      <div class="fg"><label class="fl">Adelantos / Descuentos ($)</label><input class="fi" id="cs-desc" type="number" value="0" oninput="updateSueldoCalc()"></div>
      <div id="cs-result" style="margin-top:4px"></div>
    </div>
    <div class="card">
      <div class="stitle">Comparar sueldos / Aumento</div>
      <div class="frow">
        <div class="fg"><label class="fl">Sueldo actual</label><input class="fi" id="cmp-a" type="number" placeholder="180000" oninput="updateCmp()"></div>
        <div class="fg"><label class="fl">Sueldo nuevo</label><input class="fi" id="cmp-b" type="number" placeholder="220000" oninput="updateCmp()"></div>
      </div>
      <div id="cmp-result" style="margin-top:4px"></div>
    </div>
    <div class="card">
      <div class="stitle">Conversor Horas ↔ Dinero</div>
      <div class="fg"><label class="fl">Sueldo mensual ($)</label><input class="fi" id="cv-sal" type="number" placeholder="200000" oninput="updateConversor()"></div>
      <div class="frow">

        <div class="fg"><label class="fl">Cantidad de horas</label><input class="fi" id="cv-h" type="number" value="1" step="0.5" oninput="updateConversor()"></div>
      </div>
      <div id="cv-result" style="margin-top:4px"></div>
    </div>
  </div>`;
}

function calcPress(k){
  if(k==="C"){calcExpr="";calcDisp="0";}
  else if(k==="⌫"){calcExpr=calcExpr.slice(0,-1)||"";calcDisp=calcExpr||"0";}
  else if(k==="="){
    try{
      const expr=calcExpr.replace(/×/g,"*").replace(/÷/g,"/").replace(/−/g,"-");
      const res=Function('"use strict";return ('+expr+")")();
      calcDisp=isFinite(res)?String(Math.round(res*100)/100):"Error";
      calcExpr="";
    }catch{calcDisp="Error";calcExpr="";}
  }
  else if(k==="+/−"){
    if(calcExpr&&!isNaN(calcExpr))calcExpr=String(-parseFloat(calcExpr));
    calcDisp=calcExpr||"0";
  }
  else if(k==="%"){
    try{const v=parseFloat(calcExpr)||0;calcExpr=String(v/100);calcDisp=calcExpr;}catch{}
  }
  else{
    if(calcDisp==="Error"){calcExpr="";calcDisp="0";}
    calcExpr+=k;calcDisp=calcExpr;
  }
  const d=document.getElementById("calc-disp"),e=document.getElementById("calc-expr");
  if(d)d.textContent=calcDisp;
  if(e)e.textContent=calcExpr;
}
window.calcPress=calcPress;

function updateSueldoCalc(){
  const sal=parseFloat(document.getElementById("cs-sal")?.value)||0;
  const hm=parseInt(document.getElementById("cs-hm")?.value)||160;

  const el=document.getElementById("cs-result");if(!el||!sal)return;
  const diario=sal/30,hora=sal/hm,prop=diario*dt,extrasTotal=hora*he,bruto=prop+extrasTotal,qBruta=bruto/2,qNeta=Math.max(0,qBruta-desc);

}

  </div>

    position:document.getElementById("na_pos")?.value||"",
    gender:document.getElementById("na_gen")?.value||"M",
    fechaIngreso:document.getElementById("na_ing")?.value||"",
    color:_clr,

    diasTrab:parseInt(document.getElementById("na_dt")?.value)||30,
    vacDias:parseInt(document.getElementById("na_vd")?.value)||0,

  await fbSet("employees",[...(S.employees||[]),newEmp]);

}

function buildWATexts(id){
  const e=(S.employees||[]).find(x=>x.id===id);if(!e)return{emoji:"",plain:""};
  const c=calc(e);
  const p1=getPayDate(S.viewY,S.viewM,1),p2=getPayDate(S.viewY,S.viewM,2);
  const adelantosList=(e.adelantos||[]).filter(a=>!a.cobrado);
  const descuentosList=(e.descuentos||[]).filter(d=>!d.cobrado);
  const dd=diasDesdeIngreso(e.fechaIngreso);
  const mes=`${MONTHS[S.viewM]} ${S.viewY}`;

  // ── FORMATO EMOJI ──
  let emoji=`*NOMINA AD* 💼\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`👤 *${e.name}*\n`;
  if(e.position) emoji+=`📋 ${e.position}\n`;
  if(dd!==null)  emoji+=`📅 ${dd} días en la empresa\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`📆 *${mes}*\n\n`;
  emoji+=`💵 Sueldo base: *${$(e.salary)}*\n`;
  emoji+=`📊 Días trabajados: *${c.dias}/30*\n`;
  emoji+=`💰 Proporcional: *${$(c.proporcional)}*\n`;
  if(c.totalExtras>0){
    emoji+=`\n⏱️ *Horas extra:*\n`;
    (e.extras||[]).forEach(ex=>{ emoji+=`   • ${ex.desc||"Extra"} (${ex.horas}h): ${$(c.valorHora*ex.horas)}\n`; });
    emoji+=`   Total: *${$(c.totalExtras)}*\n`;
  }
  emoji+=`\n💼 *Total bruto: ${$(c.totalBruto)}*\n`;
  emoji+=`🏦 Quincena bruta: *${$(c.quincenaBase)}*\n`;
  if(adelantosList.length>0){
    emoji+=`\n⚠️ *Adelantos:*\n`;
    adelantosList.forEach(a=>{ emoji+=`   • ${a.desc||"Adelanto"} (${a.fecha}): −${$(a.monto)}\n`; });
  }
  if(descuentosList.length>0){
    emoji+=`\n🛒 *Descuentos:*\n`;
    descuentosList.forEach(d=>{ emoji+=`   • ${d.tipo}${d.desc?": "+d.desc:""} (${d.fecha}): −${$(d.monto)}\n`; });
  }
  if(c.adelantos+c.descuentos>0) emoji+=`📉 Total descuentos: *−${$(c.adelantos+c.descuentos)}*\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`✅ *QUINCENA NETA: ${$(c.quincenaFinal)}*\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`🗓️ 1ra quincena: ${fmtD(p1)}\n`;
  emoji+=`🗓️ 2da quincena: ${fmtD(p2)}\n`;
  emoji+=`━━━━━━━━━━━━━━━`;

  // ── FORMATO TEXTO PLANO ──
  const sep=`---------------`;
  let plain=`NOMINA AD\n${sep}\n`;
  plain+=`Empleado: ${e.name}\n`;
  if(e.position) plain+=`Cargo: ${e.position}\n`;
  if(dd!==null)  plain+=`Antiguedad: ${dd} dias\n`;
  plain+=`${sep}\n`;
  plain+=`Periodo: ${mes}\n\n`;
  plain+=`Sueldo base: ${$(e.salary)}\n`;
  plain+=`Dias trabajados: ${c.dias}/30\n`;
  plain+=`Proporcional: ${$(c.proporcional)}\n`;
  if(c.totalExtras>0){
    plain+=`\nHoras extra:\n`;
    (e.extras||[]).forEach(ex=>{ plain+=`  ${ex.desc||"Extra"} (${ex.horas}h): ${$(c.valorHora*ex.horas)}\n`; });
    plain+=`  Total: ${$(c.totalExtras)}\n`;
  }
  plain+=`\nTotal bruto: ${$(c.totalBruto)}\n`;
  plain+=`Quincena bruta: ${$(c.quincenaBase)}\n`;
  if(adelantosList.length>0){
    plain+=`\nAdelantos a descontar:\n`;
    adelantosList.forEach(a=>{ plain+=`  ${a.desc||"Adelanto"} (${a.fecha}): -${$(a.monto)}\n`; });
  }
  if(descuentosList.length>0){
    plain+=`\nDescuentos:\n`;
    descuentosList.forEach(d=>{ plain+=`  ${d.tipo}${d.desc?": "+d.desc:""} (${d.fecha}): -${$(d.monto)}\n`; });
  }
  if(c.adelantos+c.descuentos>0) plain+=`Total descuentos: -${$(c.adelantos+c.descuentos)}\n`;
  plain+=`${sep}\n`;
  plain+=`QUINCENA NETA: ${$(c.quincenaFinal)}\n`;
  plain+=`${sep}\n`;
  plain+=`1ra quincena: ${fmtD(p1)}\n`;
  plain+=`2da quincena: ${fmtD(p2)}\n`;
  plain+=sep;

  return{emoji,plain};
}

let _waMode="emoji"; // "emoji" | "plain"
let _waTexts={emoji:"",plain:""};
let _waEmpId=null;

function openWA(id){
  _waEmpId=id;
  _waTexts=buildWATexts(id);
  _waMode="emoji";
  renderWASheet();
}
window.openWA=openWA;

function renderWASheet(){
  const txt=_waTexts[_waMode];
  // preview HTML: negrita para *texto*, saltos de línea
  const preview=txt
    .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
    .replace(/\*(.*?)\*/g,"<strong>$1</strong>")
    .replace(/\n/g,"<br>");

  openBS(`
    <div class="bsheet-hdr"><h3>📲 Detalle WhatsApp</h3><button class="btn-icon" onclick="closeBS()">×</button></div>
    <div class="bsheet-body">

      <!-- Selector de formato -->
      <div style="display:flex;gap:8px;margin-bottom:12px">
        <button onclick="switchWAMode('emoji')" id="wa-tab-emoji" style="
          flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;
          font-family:var(--font);transition:all .15s;
          background:${_waMode==="emoji"?"var(--goldgs)":"var(--bg2)"};
          color:${_waMode==="emoji"?"#000":"var(--txt1)"};
          border:1px solid ${_waMode==="emoji"?"var(--gold3)":"var(--border2)"};
        ">✨ Con emojis</button>
        <button onclick="switchWAMode('plain')" id="wa-tab-plain" style="
          flex:1;padding:9px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;
          font-family:var(--font);transition:all .15s;
          background:${_waMode==="plain"?"var(--goldgs)":"var(--bg2)"};
          color:${_waMode==="plain"?"#000":"var(--txt1)"};
          border:1px solid ${_waMode==="plain"?"var(--gold3)":"var(--border2)"};
        ">📄 Texto plano</button>
      </div>

      <div style="font-size:11px;color:var(--txt2);margin-bottom:6px">
        ${_waMode==="emoji"
          ?"Formato con emojis y negritas — ideal para enviar directo por WhatsApp."
          :"Texto plano sin emojis — compatible con cualquier app de mensajería."}
      </div>

      <!-- Preview -->
      <div class="wa-preview">${preview}</div>

    </div>
    <div class="bsheet-foot" style="flex-direction:column;gap:8px">
      <button class="btn-gold" onclick="copyWA()">📋 Copiar texto</button>
      <button class="btn-sec" onclick="sendWA()">💬 Abrir en WhatsApp</button>
    </div>
  `);
}

function switchWAMode(mode){
  _waMode=mode;
  renderWASheet();
}
window.switchWAMode=switchWAMode;

function copyWA(){
  const txt=_waTexts[_waMode];
  if(!txt)return;
  navigator.clipboard.writeText(txt).then(()=>toast("✓ Copiado al portapapeles"));
}
window.copyWA=copyWA;

function sendWA(){
  const txt=_waTexts[_waMode];
  if(!txt)return;
  window.open(`https://wa.me/?text=${encodeURIComponent(txt)}`,"_blank");
}
window.sendWA=sendWA;

async function toggleHid(id){const u=(S.employees||[]).map(e=>e.id===id?{...e,hidden:!e.hidden}:e);await fbSet("employees",u);}
async function removeEmp(id){if(!confirm("¿Eliminar?"))return;await fbSet("employees",(S.employees||[]).filter(e=>e.id!==id));}
function prevMonth(){if(S.viewM===0){S.viewM=11;S.viewY--;}else S.viewM--;document.getElementById("mlabel").textContent=`${MONTHS[S.viewM].slice(0,3).toUpperCase()} ${S.viewY}`;render();}
function nextMonth(){if(S.viewM===11){S.viewM=0;S.viewY++;}else S.viewM++;document.getElementById("mlabel").textContent=`${MONTHS[S.viewM].slice(0,3).toUpperCase()} ${S.viewY}`;render();}
window.toggleHid=toggleHid;window.removeEmp=removeEmp;window.prevMonth=prevMonth;window.nextMonth=nextMonth;

async function limpiarHist(){if(!confirm("¿Limpiar historial?"))return;await fbSet("historial",{});}
window.limpiarHist=limpiarHist;

function openCrearCuenta(){
  if(currentRole!=="admin"){toast("⚠ Solo los administradores pueden crear cuentas");return;}
  document.getElementById("app").style.display="none";
  document.getElementById("setup-screen").style.display="flex";
  showRegister();
}
window.openCrearCuenta=openCrearCuenta;

function shareLink(){
  const url=new URL(location.href);url.searchParams.set("room",ROOM);
  navigator.clipboard.writeText(url.toString()).then(()=>toast("✓ Link copiado"));
}
window.shareLink=shareLink;

function openSearch(){
  openBS(`
    <div class="bsheet-hdr"><h3>Buscar empleado</h3><button class="btn-icon" onclick="closeBS()">×</button></div>
    <div class="bsheet-body">
      <input class="fi" id="search-inp" placeholder="Nombre o cargo..." oninput="doSearch(this.value)" style="font-size:16px">
      <div id="search-results" style="margin-top:12px"></div>
    </div>
  `);
  setTimeout(()=>document.getElementById("search-inp")?.focus(),100);
}
window.openSearch=openSearch;

function doSearch(v){
  S.search=v;
  const emps=actEmps();
  const el=document.getElementById("search-results");
  if(!el)return;
  el.innerHTML=emps.map(e=>{const c=calc(e);return`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)" onclick="closeBS();setTab('empleados')">
    <div class="emp-av" style="background:${e.color}22;color:${e.color};width:36px;height:36px;font-size:13px">${e.name.charAt(0)}</div>
    <div style="flex:1"><div style="font-size:13px;font-weight:600">${e.name}</div><div style="font-size:11px;color:var(--txt2)">${e.position||""}</div></div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--gold)">${$(c.totalBruto)}</div>
  </div>`;}).join("")||`<div style="color:var(--txt2);font-size:13px">Sin resultados</div>`;
}
window.doSearch=doSearch;

function exportCSV(){
  const emps=(S.employees||[]).filter(e=>!e.hidden);
  const rows=[["Nombre","Género","Cargo","Fecha Ingreso","Sueldo","Días","Diario","Hora","Extras","Adelantos","Descuentos","Bruto","Quincena Neta","Anual"]];
  emps.forEach(e=>{const c=calc(e);rows.push([e.name,e.gender==="F"?"Femenino":"Masculino",e.position||"",e.fechaIngreso||"",e.salary,e.diasTrab,Math.round(c.diario),Math.round(c.valorHora),Math.round(c.totalExtras),Math.round(c.adelantos),Math.round(c.descuentos),Math.round(c.totalBruto),Math.round(c.quincenaFinal),e.salary*12]);});
  const csv=rows.map(r=>r.join(";")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));a.download=`NOMINA_AD_${MONTHS[S.viewM]}_${S.viewY}.csv`;a.click();toast("✓ CSV exportado");
}
window.exportCSV=exportCSV;

function toast(msg){
  const t=document.createElement("div");
  t.style.cssText="position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 10px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid var(--gold3)55;border-radius:20px;padding:10px 18px;font-size:12px;z-index:500;animation:fadeUp .2s ease;font-family:var(--font);color:var(--gold);box-shadow:0 4px 20px #000a;font-weight:600;white-space:nowrap";
  t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

// ── RENDER ──
function render(){
  renderNotifs();
  const views={
    dashboard:vDashboard,calendario:vCalendario,empleados:vEmpleados,
    horas:vHoras,calc:vCalc,mas:vMas,anual:vAnual,empresas:vEmpresas,
  };
  const fn=views[S.tab];
  document.getElementById("content-area").innerHTML=fn?fn():"";
  document.getElementById("mlabel").textContent=`${MONTHS[S.viewM].slice(0,3).toUpperCase()} ${S.viewY}`;
}
</script>
</body>
</html>
