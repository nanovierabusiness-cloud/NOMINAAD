<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>NOMINA AD</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#080810;--bg1:#0f0f1a;--bg2:#16162a;--bg3:#1e1e35;--bg4:#26263d;
  --gold:#d4a843;--gold2:#f0c96a;--gold3:#a07828;--gold4:#fff0c0;
  --goldg:linear-gradient(135deg,#d4a843 0%,#f0c96a 50%,#a07828 100%);
  --goldgs:linear-gradient(90deg,#d4a843,#f0c96a);
  --goldgv:linear-gradient(180deg,#d4a843,#a07828);
  --acc:#7c6dfa;--acc2:#5b8af7;--acc3:#fa8c5b;
  --ok:#3ecf8e;--danger:#f05252;--warn:#f0a832;
  --txt0:#f2f0ff;--txt1:#8888aa;--txt2:#44445a;
  --border:#1e1e35;--border2:#2a2a45;--border3:#35355a;
  --card-glow:0 0 0 1px rgba(212,168,67,.08),0 4px 24px rgba(0,0,0,.4);
  --font:'Inter',sans-serif;--display:'Cormorant Garamond',serif;--mono:'JetBrains Mono',monospace;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bot:env(safe-area-inset-bottom,0px);
  --tab-h:64px;
  --top-h:60px;
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg0);font-family:var(--font);color:var(--txt0);overscroll-behavior:none;background-image:radial-gradient(ellipse at 20% 50%,rgba(124,109,250,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(212,168,67,.04) 0%,transparent 40%)}
::-webkit-scrollbar{width:2px;height:2px}
::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.fade-up{animation:fadeUp .25s ease}

/* ══ LAYOUT MOBILE ══ */
#app{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  padding-top:var(--safe-top);
  padding-bottom:var(--safe-bot);
}

/* ── TOPBAR ── */
#topbar{
  height:var(--top-h);flex-shrink:0;
  background:rgba(15,15,26,.95);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border3);
  display:flex;align-items:center;padding:0 18px;gap:12px;
  position:relative;z-index:30;
}
#topbar::before{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)60,transparent);opacity:.6}
.tb-brand{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:4px;background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:300%;animation:shimmer 5s linear infinite}
.tb-month{display:flex;align-items:center;gap:6px;margin-left:auto;background:var(--bg3);border:1px solid var(--border3);border-radius:10px;padding:4px 6px}
.tb-month button{background:none;border:none;color:var(--txt1);border-radius:6px;width:26px;height:26px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s}
.tb-month button:active,.tb-month button:hover{color:var(--gold)}
.tb-mlabel{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--gold2);min-width:96px;text-align:center;letter-spacing:.8px}
.tb-icon{width:38px;height:38px;background:var(--bg3);border:1px solid var(--border3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:all .15s}
.tb-icon:active,.tb-icon:hover{background:var(--gold)18;border-color:var(--gold)66}

/* ── CONTENT AREA ── */
#content-area{
  flex:1;overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  padding-bottom:8px;
}
.page{padding:12px;animation:fadeUp .2s ease}

/* ── BOTTOM TABS ── */
#tabs{
  height:var(--tab-h);flex-shrink:0;
  background:rgba(15,15,26,.97);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-top:1px solid var(--border3);
  display:flex;align-items:stretch;
  position:relative;z-index:30;
}
#tabs::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)50,transparent);opacity:.7}
.tab-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;border:none;background:none;cursor:pointer;
  font-size:10px;color:var(--txt2);font-family:var(--font);font-weight:500;
  letter-spacing:.3px;transition:all .2s;padding:6px 2px;border-radius:0;
}
.tab-btn .ti{font-size:22px;line-height:1;transition:transform .2s}
.tab-btn.active{color:var(--gold2)}
.tab-btn.active .ti{transform:translateY(-1px)}
.tab-btn:hover{color:var(--txt0)}

/* ── CARDS ── */
.card{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:14px;position:relative;overflow:hidden;margin-bottom:10px}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)30,transparent)}
.csm{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:12px}
.card-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
.stat-card{background:var(--bg1);border:1px solid var(--border3);border-radius:14px;padding:14px 16px;position:relative;overflow:hidden;box-shadow:var(--card-glow)}
.stat-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)50,transparent);opacity:.6}
.slabel{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:4px;font-weight:600}
.sval{font-size:18px;font-weight:700;font-family:var(--mono)}
.ssub{font-size:10px;color:var(--txt2);margin-top:2px}

/* ── PAY CARDS ── */
.pay-card{background:var(--bg1);border:1px solid var(--border2);border-radius:12px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.pay-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold3)50,transparent)}
.pbar{background:var(--bg4);border-radius:99px;height:3px;margin-top:8px}
.pfill{height:100%;border-radius:99px;transition:width .5s}

/* ── EMP CARDS ── */
.emp-card{background:var(--bg1);border:1px solid var(--border3);border-radius:16px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:var(--card-glow);transition:border-color .2s,box-shadow .2s}
.emp-card:hover{border-color:var(--border3);box-shadow:0 0 0 1px rgba(212,168,67,.1),0 8px 32px rgba(0,0,0,.5)}
.emp-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)30,transparent);opacity:.5}
.emp-av{width:42px;height:42px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;flex-shrink:0}
.emp-actions{display:flex;gap:6px;margin-top:10px}
.ea-btn{flex:1;height:32px;border-radius:7px;border:1px solid var(--border2);background:var(--bg2);color:var(--txt1);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px;font-family:var(--font);font-weight:500}
.ea-btn:active{border-color:var(--gold);color:var(--gold)}

/* ── CHECK BUTTON ── */
.cbtn{width:32px;height:32px;border-radius:8px;border:1.5px solid var(--border2);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--gold);font-weight:700;transition:all .15s;flex-shrink:0}
.cbtn.paid{background:var(--ok)22;border-color:var(--ok);color:var(--ok)}
.cbtn:active{transform:scale(.92)}

/* ── MODAL BOTTOM SHEET ── */
.bsheet-overlay{position:fixed;inset:0;background:#000000aa;z-index:200;display:flex;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(4px)}
.bsheet{background:var(--bg1);border-radius:20px 20px 0 0;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;position:relative;padding-bottom:calc(20px + var(--safe-bot))}
.bsheet::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--goldgs);border-radius:20px 20px 0 0}
.bsheet-handle{width:36px;height:4px;background:var(--border2);border-radius:99px;margin:12px auto 4px}
.bsheet-hdr{padding:8px 18px 0;display:flex;align-items:center;justify-content:space-between}
.bsheet-hdr h3{font-size:15px;font-weight:700;letter-spacing:.3px}
.bsheet-body{padding:14px 18px}
.bsheet-foot{padding:0 18px;display:flex;gap:8px;margin-top:4px}

/* ── FORMS ── */
.fg{margin-bottom:12px}
.fl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;display:block;font-weight:600}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border3);border-radius:10px;color:var(--txt0);padding:11px 14px;font-size:15px;outline:none;font-family:var(--font);-webkit-appearance:none;appearance:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:var(--gold)88;box-shadow:0 0 0 3px rgba(212,168,67,.12)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.fhint{font-size:11px;color:var(--txt1);margin-top:5px;padding:8px 12px;background:var(--bg2);border-radius:6px;border-left:2px solid var(--gold3);font-family:var(--mono);line-height:1.6}

/* ── BUTTONS ── */
.btn-gold{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);background:var(--goldgs);color:#000;letter-spacing:.3px;width:100%;box-shadow:0 4px 16px rgba(212,168,67,.3);transition:all .2s}
.btn-gold:active{opacity:.88;transform:scale(.98);box-shadow:0 2px 8px rgba(212,168,67,.2)}
.btn-gold:hover{box-shadow:0 6px 20px rgba(212,168,67,.4)}
.btn-sec{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border3);font-family:var(--font);background:var(--bg2);color:var(--txt1);width:100%;transition:all .15s}
.btn-sec:active,.btn-sec:hover{border-color:var(--gold)55;color:var(--gold2)}
.btn-sm{padding:8px 14px;font-size:12px;border-radius:8px;width:auto}
.btn-icon{width:36px;height:36px;border-radius:8px;border:1px solid var(--border2);background:var(--bg2);color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;flex-shrink:0}
.btn-icon:active{border-color:var(--gold3);color:var(--gold)}
.btn-danger{border-color:var(--danger)44!important;color:var(--danger)!important}

/* ── CHIPS ── */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.4px}
.cok{background:var(--ok)18;color:var(--ok);border:1px solid var(--ok)33}
.cwn{background:var(--warn)18;color:var(--warn);border:1px solid var(--warn)33}
.cdn{background:var(--danger)18;color:var(--danger);border:1px solid var(--danger)33}
.cinf{background:var(--gold3)18;color:var(--gold2);border:1px solid var(--gold3)33}
.cne{background:var(--bg3);color:var(--txt2);border:1px solid var(--border2)}
.cfem{background:var(--gold)15;color:var(--gold2);border:1px solid var(--gold3)33}

/* ── MINI CAL ── */
.calg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.chd{text-align:center;font-size:9px;color:var(--txt2);font-weight:700;padding:2px;letter-spacing:1px}
.cc{text-align:center;padding:5px 2px;border-radius:5px;font-size:11px}
.cc.pay{background:var(--goldgs);color:#000;font-weight:700}
.cc.tod{background:var(--bg3);color:var(--gold2);font-weight:700;border:1px solid var(--gold3)44}
.cc.hol{color:var(--danger)}
.cc.wkd{color:var(--txt2)}
.cc.wkk{color:var(--txt1)}

/* ── CALCULATOR ── */
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:10px}
.calc-btn{height:52px;border-radius:10px;border:1px solid var(--border2);background:var(--bg2);color:var(--txt0);font-size:17px;font-weight:600;cursor:pointer;font-family:var(--mono);display:flex;align-items:center;justify-content:center}
.calc-btn:active{background:var(--bg3);transform:scale(.95)}
.calc-btn.op{background:var(--gold)18;color:var(--gold);border-color:var(--gold3)44}
.calc-btn.op:active{background:var(--gold)30}
.calc-btn.eq{background:var(--goldgs);color:#000;border-color:var(--gold)}
.calc-btn.eq:active{opacity:.85}
.calc-btn.clr{background:var(--danger)18;color:var(--danger);border-color:var(--danger)44}
.calc-display{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:var(--mono);margin-bottom:6px}
.calc-expr{font-size:12px;color:var(--txt2);min-height:16px;word-break:break-all}
.calc-result{font-size:26px;font-weight:700;color:var(--gold);text-align:right;word-break:break-all}

/* ── NOTIF ── */
#nwrap{position:fixed;top:calc(var(--top-h) + var(--safe-top) + 8px);left:8px;right:8px;z-index:100;display:flex;flex-direction:column;gap:6px}
.notif{background:var(--bg2);border:1px solid var(--gold3)55;border-radius:10px;padding:10px 12px;display:flex;gap:10px;align-items:flex-start;animation:slideIn .3s ease;box-shadow:0 4px 20px #000a}
.nclose{background:none;border:none;color:var(--txt2);cursor:pointer;font-size:16px;padding:0;flex-shrink:0}

/* ── CONN ── */
#conn-badge{position:fixed;bottom:calc(var(--tab-h) + var(--safe-bot) + 10px);right:10px;z-index:50;display:none;align-items:center;gap:6px;background:rgba(15,15,26,.9);backdrop-filter:blur(10px);border:1px solid var(--border3);border-radius:99px;padding:5px 12px;font-size:11px;font-family:var(--mono);box-shadow:0 2px 12px rgba(0,0,0,.4)}
.conn-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.conn-dot.online{background:var(--ok);animation:pulse 2s infinite}
.conn-dot.offline{background:var(--danger)}
.conn-dot.syncing{background:var(--gold);animation:pulse .8s infinite}

/* ── SETUP SCREEN ── */
#setup-screen{
  position:fixed;inset:0;z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,.08) 0%,transparent 60%),var(--bg0);
}
.setup-box{width:100%;max-width:400px;background:var(--bg1);border:1px solid var(--border3);border-radius:24px;padding:36px 32px;box-shadow:0 0 0 1px rgba(212,168,67,.06),0 24px 64px rgba(0,0,0,.6)}
.setup-title{font-family:var(--display);font-size:44px;font-weight:700;letter-spacing:6px;background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:300%;animation:shimmer 5s linear infinite;text-align:center;margin-bottom:4px}
.setup-sub{font-size:9px;color:var(--gold3);letter-spacing:8px;text-transform:uppercase;text-align:center;margin-bottom:36px;opacity:.7}
.setup-hint{font-size:11px;color:var(--txt2);line-height:1.7;margin-top:6px;padding:10px 12px;background:var(--bg2);border-radius:8px;border-left:2px solid var(--gold3)}

/* ── STITLE ── */
.stitle{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:10px}
.empty{text-align:center;padding:40px 20px;color:var(--txt2);font-size:13px}

/* ── DIVIDER ── */
.gdiv{height:1px;background:linear-gradient(90deg,transparent,var(--gold3)50,transparent);margin:12px 0}

/* ── DESCUENTO / ADELANTO ITEMS ── */
.disc-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.disc-item:last-child{border-bottom:none}

/* ── WA PREVIEW ── */
.wa-preview{background:var(--bg2);border:1px solid var(--border2);border-radius:10px;padding:14px;font-family:var(--mono);font-size:12px;color:var(--txt1);line-height:1.8;white-space:pre-wrap;word-break:break-word;margin-top:10px;max-height:280px;overflow-y:auto}


/* ══ KIOSKO EMPLEADO ══ */
#kiosk-screen{
  position:fixed;inset:0;z-index:150;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,.10) 0%,transparent 60%),var(--bg0);
  display:none;flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
}
.kiosk-brand{font-family:var(--display);font-size:32px;font-weight:700;letter-spacing:5px;
  background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;background-size:300%;animation:shimmer 5s linear infinite;
  text-align:center;margin-bottom:4px}
.kiosk-sub{font-size:9px;color:var(--gold3);letter-spacing:6px;text-transform:uppercase;text-align:center;margin-bottom:28px;opacity:.7}
.kiosk-box{width:100%;max-width:340px;background:var(--bg1);border:1px solid var(--border3);border-radius:22px;padding:28px 24px;box-shadow:0 0 0 1px rgba(212,168,67,.06),0 24px 64px rgba(0,0,0,.6)}
.kiosk-clock{font-family:var(--mono);font-size:48px;font-weight:700;color:var(--gold2);text-align:center;letter-spacing:2px;margin-bottom:4px;line-height:1}
.kiosk-date{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:24px;letter-spacing:.5px}
.kiosk-who{font-size:14px;font-weight:600;color:var(--txt0);text-align:center;margin-bottom:6px}
.kiosk-sel{font-size:11px;color:var(--txt2);text-align:center;margin-bottom:16px}
.kiosk-emp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:18px;max-height:220px;overflow-y:auto}
.kiosk-emp-btn{
  background:var(--bg2);border:1px solid var(--border3);border-radius:12px;
  padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.kiosk-emp-btn:active,.kiosk-emp-btn.selected{border-color:var(--gold)66;background:var(--gold)12}
.kiosk-emp-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0}
.kiosk-emp-name{font-size:11px;font-weight:600;color:var(--txt0);line-height:1.2}
/* PIN PAD */
.pin-display{display:flex;gap:10px;justify-content:center;margin-bottom:20px;min-height:20px}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border3);transition:all .2s}
.pin-dot.filled{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(212,168,67,.4)}
.pin-dot.error{background:var(--danger);border-color:var(--danger)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{
  height:58px;border-radius:14px;border:1px solid var(--border3);
  background:var(--bg2);color:var(--txt0);font-size:22px;font-weight:500;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  font-family:var(--mono);transition:all .15s;
}
.pin-key:active{background:var(--gold)22;border-color:var(--gold)66;transform:scale(.93)}
.pin-key.del{font-size:18px;color:var(--txt2)}
.pin-key.del:active{background:var(--danger)18;border-color:var(--danger)44;color:var(--danger)}
.pin-err{font-size:12px;color:var(--danger);text-align:center;margin-top:8px;min-height:16px}
/* FICHAJE RESULT */
.kiosk-result{text-align:center;padding:24px 0}
.kiosk-result-icon{font-size:56px;margin-bottom:12px;line-height:1}
.kiosk-result-title{font-size:18px;font-weight:700;margin-bottom:4px}
.kiosk-result-sub{font-size:13px;color:var(--txt2);margin-bottom:20px}
.kiosk-result-cobro{background:var(--bg2);border:1px solid var(--border3);border-radius:12px;padding:14px;margin-bottom:16px;text-align:left}
.kiosk-notif-list{max-height:200px;overflow-y:auto;text-align:left}

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

// ── CONSTANTES ──
const HOLIDAYS=new Set(["2025-01-01","2025-03-03","2025-03-04","2025-04-02","2025-04-18","2025-05-01","2025-05-25","2025-06-16","2025-06-20","2025-07-09","2025-08-17","2025-10-12","2025-11-20","2025-12-08","2025-12-25","2026-01-01","2026-02-16","2026-02-17","2026-04-02","2026-04-03","2026-05-01","2026-05-25","2026-06-15","2026-06-20","2026-07-09","2026-08-17","2026-10-12","2026-11-20","2026-12-08","2026-12-25"]);
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DSHORT=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const COLORS=["#c9a84c","#e8c96d","#a07830","#d4a853","#b8963e","#f0d060","#967028","#deb84a","#c09038","#e0c058"];
const pad=n=>String(n).padStart(2,"0");
const toKey=d=>`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const isHol=d=>HOLIDAYS.has(toKey(d));
const isWork=d=>d.getDay()!==0&&d.getDay()!==6&&!isHol(d);
const TODAY=new Date();TODAY.setHours(0,0,0,0);

function getPayDate(y,m,q){
  const s=q===1?1:16,e=q===1?15:new Date(y,m+1,0).getDate();
  let n=0;
  for(let d=s;d<=e;d++){const dt=new Date(y,m,d);if(isWork(dt)){n++;if(n===4)return dt;}}
  return null;
}
const fmtD=d=>d?`${DSHORT[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`:"—";
const dUntil=d=>d?Math.round((d-TODAY)/86400000):null;
const $=n=>(n===null||n===undefined||isNaN(n))?"—":"$"+Math.round(n).toLocaleString("es-AR");

// Días desde ingreso
function diasDesdeIngreso(fechaIngreso){
  if(!fechaIngreso)return null;
  const fi=new Date(fechaIngreso);
  return Math.floor((TODAY-fi)/86400000);
}

function calc(emp){
  const base=parseFloat(emp.salary)||0;
  const hm=parseInt(emp.horasMes)||160;
  const vac=parseInt(emp.vacDias)||0;
  const diario=base/30;
  const valorHora=base/hm;

  // Auto-calcular días proporcionales si el empleado ingresó este mes
  let diasBase=Math.min(parseInt(emp.diasTrab)||30,30);
  let diasDesdeAlta=null; // días que le corresponden por ingreso este mes
  if(emp.fechaIngreso){
    const fi=new Date(emp.fechaIngreso+"T00:00:00");
    if(fi.getFullYear()===S.viewY&&fi.getMonth()===S.viewM){
      // Ingresó en el mes que estamos viendo
      const lastDay=new Date(S.viewY,S.viewM+1,0).getDate();
      diasDesdeAlta=lastDay-fi.getDate()+1; // días desde su ingreso hasta fin de mes
      diasBase=Math.min(diasDesdeAlta,30);
    }
  }

  const dias=diasBase;
  const diasEfect=Math.max(0,dias-vac);
  const proporcional=diario*diasEfect;
  const totalExtras=(emp.extras||[]).reduce((s,ex)=>s+valorHora*(parseFloat(ex.horas)||0),0);
  const adelantos=(emp.adelantos||[]).filter(a=>!a.cobrado).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
  const descuentos=(emp.descuentos||[]).filter(d=>!d.cobrado).reduce((s,d)=>s+(parseFloat(d.monto)||0),0);
  const totalBruto=proporcional+totalExtras;
  const quincenaBase=totalBruto/2;
  const quincenaFinal=Math.max(0,quincenaBase-adelantos-descuentos);

  // Qué le correspondía si hubiera trabajado el mes completo
  const quincenaCompleta=base/2;
  const esNuevo=diasDesdeAlta!==null;

  return{base,diario,valorHora,dias,diasEfect,vac,proporcional,totalExtras,totalBruto,
    quincenaBase,quincenaFinal,adelantos,descuentos,esNuevo,diasDesdeAlta,quincenaCompleta};
}

window.showLogin=showLogin;window.showRegister=showRegister;window.togglePassVis=togglePassVis;window.showLanding=showLanding;window.showLoginForm=showLoginForm;window.showKioskDirect=showKioskDirect;

async function doLogin(){
  const email=document.getElementById("auth-email").value.trim();
  const pass=document.getElementById("auth-pass").value;
  const errEl=document.getElementById("setup-err");errEl.style.display="none";
  if(!email||!pass){errEl.textContent="Completá email y contraseña";errEl.style.display="block";return;}
  try{await signInWithEmailAndPassword(auth,email,pass);}
  catch(e){
    const m={"auth/invalid-credential":"Email o contraseña incorrectos.","auth/user-not-found":"No existe esa cuenta.","auth/wrong-password":"Contraseña incorrecta.","auth/too-many-requests":"Demasiados intentos. Esperá unos minutos."};
    errEl.textContent=m[e.code]||"Error: "+e.message;errEl.style.display="block";
  }
}
window.doLogin=doLogin;

async function doRegister(){
  const name=document.getElementById("reg-name").value.trim();
  const email=document.getElementById("reg-email").value.trim();
  const pass=document.getElementById("reg-pass").value;
  const role=document.getElementById("reg-role").value;
  const errEl=document.getElementById("reg-err"),okEl=document.getElementById("reg-ok");
  errEl.style.display="none";okEl.style.display="none";
  if(!name||!email||!pass){errEl.textContent="Completá todos los campos";errEl.style.display="block";return;}
  if(pass.length<6){errEl.textContent="La contraseña necesita al menos 6 caracteres";errEl.style.display="block";return;}
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await set(ref(db,"nomina/"+ROOM+"/users/"+cred.user.uid),{name,email,role,createdAt:Date.now()});
    okEl.textContent="✓ Cuenta creada para "+name+". Ya puede iniciar sesión desde la pantalla de inicio.";okEl.style.display="block";
    // Auto-return to app after 2 seconds
    setTimeout(()=>{
      if(currentUser&&_loaded){
        document.getElementById("setup-screen").style.display="none";
        document.getElementById("app").style.display="flex";
      }else{showLanding();}
    },2500);
    document.getElementById("reg-name").value="";document.getElementById("reg-email").value="";document.getElementById("reg-pass").value="";
  }catch(e){
    const m={"auth/email-already-in-use":"Ya existe una cuenta con ese email.","auth/weak-password":"Contraseña muy débil.","auth/invalid-email":"Email inválido."};
    errEl.textContent=m[e.code]||"Error: "+e.message;errEl.style.display="block";
  }
}
window.doRegister=doRegister;

async function doResetPass(){
  const email=document.getElementById("auth-email").value.trim();
  const errEl=document.getElementById("setup-err");

}
window.doResetPass=doResetPass;

window.addEventListener("load",()=>{
  const app=initializeApp(FIREBASE_CONFIG,"nad");
  db=getDatabase(app);auth=getAuth(app);
  onAuthStateChanged(auth,async(user)=>{
    if(user){
      currentUser=user;
      // Leer rol
      onValue(ref(db,"nomina/"+ROOM+"/users/"+user.uid),(snap)=>{
        const data=snap.val()||{};
        currentRole=data.role||"admin";
        if(!snap.val()){
          // primer usuario = admin automáticamente
          set(ref(db,"nomina/"+ROOM+"/users/"+user.uid),{name:user.email,email:user.email,role:"admin",createdAt:Date.now()});
          currentRole="admin";
        }
        roomRef=ref(db,"nomina/"+ROOM);
        iniciarSync();
      },{onlyOnce:true});
    }else{
      document.getElementById("setup-screen").style.display="flex";
      document.getElementById("kiosk-screen").style.display="none";
      document.getElementById("app").style.display="none";
      _loaded=false;
      showLanding();
    }
  });
});

  // Show user name instead of room key
  const displayName=currentUser?.displayName||currentUser?.email?.split("@")[0]||lbl;

  label.style.color=st==="online"?"var(--ok)":st==="offline"?"var(--danger)":"var(--txt1)";
}

function iniciarSync(){
  document.getElementById("conn-badge").style.display="flex";
  setConn("syncing","Conectando...");
  onValue(roomRef,(snap)=>{
    const data=snap.val();
    if(!data){
      set(roomRef,{
        companies:[{id:1,name:"Mi Empresa",cuit:""}],
        employees:[
          {id:1,name:"María González",salary:180000,gender:"F",color:"#c9a84c",hidden:false,position:"Administrativa",horasMes:160,diasTrab:30,vacDias:0,extras:[],adelantos:[],descuentos:[],fechaIngreso:""},
          {id:2,name:"Carlos Rodríguez",salary:220000,gender:"M",color:"#e8c96d",hidden:false,position:"Técnico",horasMes:160,diasTrab:30,vacDias:0,extras:[],adelantos:[],descuentos:[],fechaIngreso:""},
        ],
        paid:{},historial:[],
      });return;
    }
    S.companies=data.companies?Object.values(data.companies):[];
    S.employees=data.employees?Object.values(data.employees):[];
    S.paid=data.paid||{};
    S.historial=data.historial?Object.values(data.historial).sort((a,b)=>b._ts-a._ts):[];
    S.cronograma=data.cronograma?Object.values(data.cronograma):[];

async function fbSet(path,val){

  const allowedForViewer=path.startsWith("employees")||path.startsWith("notificaciones");

const mk=(id,q)=>`${S.viewY}_${S.viewM}_${id}_${q}`;
const isPaid=(id,q)=>!!S.paid[mk(id,q)];

async function togglePaid(id,q){
  const was=S.paid[mk(id,q)];
  const emp=S.employees.find(e=>e.id===id);
  const c=calc(emp);
  const lbl=`${q===1?"1ra":"2da"} Quincena — ${MONTHS[S.viewM]} ${S.viewY}`;
  const newPaid={...S.paid,[mk(id,q)]:!was};
  let newHist=[...(S.historial||[])];
  if(!was){
    newHist.unshift({empId:id,empName:emp.name,empColor:emp.color,concepto:lbl,bruto:c.quincenaBase,adelantos:c.adelantos,descuentos:c.descuentos,neto:c.quincenaFinal,fecha:TODAY.toLocaleDateString("es-AR"),_ts:Date.now()});
    // Marcar adelantos y descuentos como cobrados
    const updEmps=S.employees.map(e=>e.id===id?{...e,
      adelantos:(e.adelantos||[]).map(a=>({...a,cobrado:true})),
      descuentos:(e.descuentos||[]).map(d=>({...d,cobrado:true})),
    }:e);
    await fbSet("employees",updEmps);
  }else{newHist=newHist.filter(h=>!(h.empId===id&&h.concepto===lbl));}
  await set(ref(db,`nomina/${ROOM}/paid`),newPaid);
  await set(ref(db,`nomina/${ROOM}/historial`),newHist.length?newHist:{});
}
window.togglePaid=togglePaid;

  let l=(S.employees||[]).filter(e=>!e.hidden);

function chipD(days,paid){
  if(paid)return`<span class="chip cok">✓ Cobrado</span>`;

  if(days<0)return`<span class="chip cdn">Vencido</span>`;
  if(days===0)return`<span class="chip cwn">¡HOY!</span>`;
  if(days<=5)return`<span class="chip cwn">${days}d</span>`;

function renderNotifs(){
  const p1=getPayDate(S.viewY,S.viewM,1),p2=getPayDate(S.viewY,S.viewM,2);

function calcPress(k){
  if(k==="C"){calcExpr="";calcDisp="0";}
  else if(k==="⌫"){calcExpr=calcExpr.slice(0,-1)||"";calcDisp=calcExpr||"0";}
  else if(k==="="){
    try{
      const expr=calcExpr.replace(/×/g,"*").replace(/÷/g,"/").replace(/−/g,"-");
      const res=Function('"use strict";return ('+expr+")")();
      calcDisp=isFinite(res)?String(Math.round(res*100)/100):"Error";
      calcExpr="";
    }catch{calcDisp="Error";calcExpr="";}
  }
  else if(k==="+/−"){
    if(calcExpr&&!isNaN(calcExpr))calcExpr=String(-parseFloat(calcExpr));
    calcDisp=calcExpr||"0";
  }
  else if(k==="%"){
    try{const v=parseFloat(calcExpr)||0;calcExpr=String(v/100);calcDisp=calcExpr;}catch{}
  }
  else{
    if(calcDisp==="Error"){calcExpr="";calcDisp="0";}
    calcExpr+=k;calcDisp=calcExpr;
  }
  const d=document.getElementById("calc-disp"),e=document.getElementById("calc-expr");
  if(d)d.textContent=calcDisp;
  if(e)e.textContent=calcExpr;
}
window.calcPress=calcPress;

function buildWATexts(id){
  const e=(S.employees||[]).find(x=>x.id===id);if(!e)return{emoji:"",plain:""};
  const c=calc(e);
  const p1=getPayDate(S.viewY,S.viewM,1),p2=getPayDate(S.viewY,S.viewM,2);
  const adelantosList=(e.adelantos||[]).filter(a=>!a.cobrado);
  const descuentosList=(e.descuentos||[]).filter(d=>!d.cobrado);
  const dd=diasDesdeIngreso(e.fechaIngreso);
  const mes=`${MONTHS[S.viewM]} ${S.viewY}`;

  // ── FORMATO EMOJI ──
  let emoji=`*NOMINA AD* 💼\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`👤 *${e.name}*\n`;
  if(e.position) emoji+=`📋 ${e.position}\n`;
  if(dd!==null)  emoji+=`📅 ${dd} días en la empresa\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`📆 *${mes}*\n\n`;
  emoji+=`💵 Sueldo base: *${$(e.salary)}*\n`;
  emoji+=`📊 Días trabajados: *${c.dias}/30*\n`;
  emoji+=`💰 Proporcional: *${$(c.proporcional)}*\n`;
  if(c.totalExtras>0){
    emoji+=`\n⏱️ *Horas extra:*\n`;
    (e.extras||[]).forEach(ex=>{ emoji+=`   • ${ex.desc||"Extra"} (${ex.horas}h): ${$(c.valorHora*ex.horas)}\n`; });
    emoji+=`   Total: *${$(c.totalExtras)}*\n`;
  }
  emoji+=`\n💼 *Total bruto: ${$(c.totalBruto)}*\n`;
  emoji+=`🏦 Quincena bruta: *${$(c.quincenaBase)}*\n`;
  if(adelantosList.length>0){
    emoji+=`\n⚠️ *Adelantos:*\n`;
    adelantosList.forEach(a=>{ emoji+=`   • ${a.desc||"Adelanto"} (${a.fecha}): −${$(a.monto)}\n`; });
  }
  if(descuentosList.length>0){
    emoji+=`\n🛒 *Descuentos:*\n`;
    descuentosList.forEach(d=>{ emoji+=`   • ${d.tipo}${d.desc?": "+d.desc:""} (${d.fecha}): −${$(d.monto)}\n`; });
  }
  if(c.adelantos+c.descuentos>0) emoji+=`📉 Total descuentos: *−${$(c.adelantos+c.descuentos)}*\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`✅ *QUINCENA NETA: ${$(c.quincenaFinal)}*\n`;
  emoji+=`━━━━━━━━━━━━━━━\n`;
  emoji+=`🗓️ 1ra quincena: ${fmtD(p1)}\n`;
  emoji+=`🗓️ 2da quincena: ${fmtD(p2)}\n`;
  emoji+=`━━━━━━━━━━━━━━━`;

  // ── FORMATO TEXTO PLANO ──
  const sep=`---------------`;
  let plain=`NOMINA AD\n${sep}\n`;
  plain+=`Empleado: ${e.name}\n`;
  if(e.position) plain+=`Cargo: ${e.position}\n`;
  if(dd!==null)  plain+=`Antiguedad: ${dd} dias\n`;
  plain+=`${sep}\n`;
  plain+=`Periodo: ${mes}\n\n`;
  plain+=`Sueldo base: ${$(e.salary)}\n`;
  plain+=`Dias trabajados: ${c.dias}/30\n`;
  plain+=`Proporcional: ${$(c.proporcional)}\n`;
  if(c.totalExtras>0){
    plain+=`\nHoras extra:\n`;
    (e.extras||[]).forEach(ex=>{ plain+=`  ${ex.desc||"Extra"} (${ex.horas}h): ${$(c.valorHora*ex.horas)}\n`; });
    plain+=`  Total: ${$(c.totalExtras)}\n`;
  }
  plain+=`\nTotal bruto: ${$(c.totalBruto)}\n`;
  plain+=`Quincena bruta: ${$(c.quincenaBase)}\n`;
  if(adelantosList.length>0){
    plain+=`\nAdelantos a descontar:\n`;
    adelantosList.forEach(a=>{ plain+=`  ${a.desc||"Adelanto"} (${a.fecha}): -${$(a.monto)}\n`; });
  }
  if(descuentosList.length>0){
    plain+=`\nDescuentos:\n`;
    descuentosList.forEach(d=>{ plain+=`  ${d.tipo}${d.desc?": "+d.desc:""} (${d.fecha}): -${$(d.monto)}\n`; });
  }
  if(c.adelantos+c.descuentos>0) plain+=`Total descuentos: -${$(c.adelantos+c.descuentos)}\n`;
  plain+=`${sep}\n`;
  plain+=`QUINCENA NETA: ${$(c.quincenaFinal)}\n`;
  plain+=`${sep}\n`;
  plain+=`1ra quincena: ${fmtD(p1)}\n`;
  plain+=`2da quincena: ${fmtD(p2)}\n`;
  plain+=sep;

  return{emoji,plain};
}

// Helpers de tiempo
function todayStr(){const n=new Date();return`${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`;}
function nowStr(){const n=new Date();return`${pad(n.getHours())}:${pad(n.getMinutes())}`;}
function parseTime(t){if(!t)return null;const[h,m]=t.split(":").map(Number);return h*60+m;}
function diffHours(entrada,salida){const e=parseTime(entrada),s=parseTime(salida);if(!e||!s)return 0;const diff=s-e;return diff>0?diff/60:0;}
function fmtHours(h){const hrs=Math.floor(h),mins=Math.round((h-hrs)*60);return`${hrs}h${mins>0?" "+mins+"m":""}`;}

// Calcular días trabajados y horas extra de un empleado en el mes actual
function calcAsistencia(emp){
  const registros=(emp.asistencia||[]).filter(r=>{
    const d=new Date(r.fecha+"T00:00:00");
    return d.getFullYear()===S.viewY&&d.getMonth()===S.viewM;
  });
  const horasPactadasDia=(parseInt(emp.horasMes)||160)/30;
  let diasPresente=0,totalHoras=0,totalExtras=0;
  registros.forEach(r=>{
    if(r.entrada&&r.salida){
      diasPresente++;
      const hTrab=diffHours(r.entrada,r.salida)-((parseFloat(r.descanso)||0)/60);
      totalHoras+=Math.max(0,hTrab);
      const extra=Math.max(0,hTrab-horasPactadasDia);
      totalExtras+=extra;
    }
  });
  return{registros,diasPresente,totalHoras,totalExtras,horasPactadasDia};
}

// Fichar entrada o salida
async function fichar(empId){
  const emp=(S.employees||[]).find(e=>e.id===empId);if(!emp)return;
  const hoy=todayStr();
  const asist=[...(emp.asistencia||[])];
  const idx=asist.findIndex(r=>r.fecha===hoy);
  if(idx===-1){
    // Nueva entrada
    asist.push({fecha:hoy,entrada:nowStr(),salida:null,descanso:30,nota:""});
    toast("✅ Entrada registrada — "+nowStr());
  } else if(!asist[idx].salida){
    // Registrar salida
    asist[idx]={...asist[idx],salida:nowStr()};
    const h=diffHours(asist[idx].entrada,asist[idx].salida)-((asist[idx].descanso||30)/60);
    toast(`✅ Salida registrada — ${nowStr()} · ${fmtHours(Math.max(0,h))} trabajadas`);
  } else {
    toast("⚠ Ya registraste entrada y salida hoy");
    return;
  }
  const updated=(S.employees||[]).map(e=>e.id===empId?{...e,asistencia:asist}:e);
  await fbSet("employees",updated);
}
window.fichar=fichar;

async function guardarRegistro(empId,fecha){
  const entrada=document.getElementById("ar-entrada")?.value;
  const salida=document.getElementById("ar-salida")?.value;
  const descanso=parseFloat(document.getElementById("ar-desc")?.value)||30;
  const nota=document.getElementById("ar-nota")?.value||"";
  const emp=(S.employees||[]).find(e=>e.id===empId);if(!emp)return;
  const asist=[...(emp.asistencia||[])];
  const idx=asist.findIndex(r=>r.fecha===fecha);
  if(idx===-1) asist.push({fecha,entrada,salida,descanso,nota});
  else asist[idx]={...asist[idx],fecha,entrada,salida,descanso,nota};
  const updated=(S.employees||[]).map(e=>e.id===empId?{...e,asistencia:asist}:e);
  await fbSet("employees",updated);
  closeBS();toast("✓ Registro guardado");
}
window.guardarRegistro=guardarRegistro;

async function eliminarRegistro(empId,fecha){
  if(!confirm("¿Eliminar registro del "+fecha+"?"))return;
  const updated=(S.employees||[]).map(e=>e.id===empId?{...e,asistencia:(e.asistencia||[]).filter(r=>r.fecha!==fecha)}:e);
  await fbSet("employees",updated);
  toast("✓ Registro eliminado");
}
window.eliminarRegistro=eliminarRegistro;

async function aplicarAsistencia(empId){
  const emp=(S.employees||[]).find(e=>e.id===empId);if(!emp)return;
  const a=calcAsistencia(emp);
  const valorHora=(parseFloat(emp.salary)||0)/(parseInt(emp.horasMes)||160);
  const extrasVal=Math.round(a.totalExtras*valorHora);

  // Actualizar diasTrab y agregar horas extra automáticamente
  let extras=[...(emp.extras||[]).filter(ex=>ex.auto!==true)]; // quitar auto-extras previos
  if(a.totalExtras>0.1) extras.push({horas:Math.round(a.totalExtras*10)/10,desc:`Extras por asistencia ${MONTHS[S.viewM]} ${S.viewY}`,auto:true});

  const updated=(S.employees||[]).map(e=>e.id===empId?{...e,diasTrab:Math.min(30,a.diasPresente),extras}:e);
  await fbSet("employees",updated);
  toast(`✓ Aplicado: ${a.diasPresente} días · ${fmtHours(a.totalExtras)} extras`);
}

function startKioskClock(){
  clearInterval(_kioskClockInt);
  const tick=()=>{
    const n=new Date();
    const h=pad(n.getHours()),m=pad(n.getMinutes()),s=pad(n.getSeconds());
    document.getElementById("kiosk-clock").textContent=`${h}:${m}:${s}`;
    const days=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
    document.getElementById("kiosk-date").textContent=`${days[n.getDay()]} ${n.getDate()} de ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  };
  tick();_kioskClockInt=setInterval(tick,1000);
}

async function kioskFichar(){
  if(!_kioskEmp)return;
  const emp=_kioskEmp;
  const hoy=todayStr();
  const now=nowStr();
  const asist=[...(emp.asistencia||[])];
  const idx=asist.findIndex(r=>r.fecha===hoy);
  let accion="",icon="",color="";

  if(idx===-1){
    // Primera vez hoy → registrar entrada
    asist.push({fecha:hoy,entrada:now,salida:null,descanso:30,nota:"",ficherado:true});
    accion="ENTRADA";icon="🟢";color="var(--ok)";
  }else if(!asist[idx].salida){
    // Tiene entrada pero no salida → registrar salida (informativa, no afecta sueldo)
    asist[idx]={...asist[idx],salida:now};
    accion="SALIDA";icon="🔴";color="var(--danger)";
  }else{
    // Ya tiene ambas → mostrar confirmación del día
    accion="YA REGISTRADO";icon="✅";color="var(--gold)";
  }

  // Save to Firebase
  const updated=(S.employees||[]).map(e=>String(e.id)===String(emp.id)?{...e,asistencia:asist}:e);
  await fbSet("employees",updated);
  // Update local
  S.employees=updated;
  _kioskEmp={...emp,asistencia:asist};

  // Render result
  const box=document.getElementById("kiosk-step-content");if(!box)return;
  const regHoy=asist.find(r=>r.fecha===hoy);

  // Próximo cobro
  const c=calcKiosk(emp);
  const p2=getPayDate(S.viewY,S.viewM,2);
  const d2=dUntil(p2);

  // Notificaciones — usar get directo con el db ya inicializado
  let notifsSnap=[];
  try{
    const nSnap=await get(ref(db,"nomina/"+ROOM+"/notificaciones"));
    const nData=nSnap.val()||{};
    notifsSnap=Object.values(nData).sort((a,b)=>(b.ts||0)-(a.ts||0)).slice(0,3);
  }catch(e){notifsSnap=[];}

  box.innerHTML=`
    <div class="kiosk-result">
      <div class="kiosk-result-icon">${icon}</div>
      <div class="kiosk-result-title" style="color:${color}">${accion} REGISTRADA</div>
      <div class="kiosk-result-sub">
        ${accion==="ENTRADA"?`¡Hola ${emp.name.split(" ")[0]}! Entrada: <strong style="color:var(--ok)">${now}</strong>`
          :accion==="SALIDA"?`¡Hasta luego ${emp.name.split(" ")[0]}! Salida: <strong style="color:var(--danger)">${now}</strong>${regHoy?.entrada?` · Trabajaste desde ${regHoy.entrada}`:""}`
          :`Jornada ya registrada hoy`}
      </div>
      ${accion==="SALIDA"?`
        <div style="font-size:12px;color:var(--txt2);margin-bottom:14px;padding:8px 12px;background:var(--bg2);border-radius:8px;border-left:2px solid var(--gold3)">
          📋 El admin revisará si fue hora extra según tus tareas completadas.
        </div>`:""}
      <!-- Próximo cobro -->
      <div class="kiosk-result-cobro">
        <div style="font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px">Tu próximo cobro</div>
        <div style="font-size:24px;font-weight:700;font-family:var(--mono);background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px">${$(c.quincenaFinal)}</div>
        <div style="font-size:11px;color:var(--txt2)">${fmtD(p2)}${d2!==null&&d2>=0&&d2<=7?` · en ${d2} día${d2!==1?"s":""}`:""}  </div>
      </div>
      <!-- Notificaciones -->
      ${notifsSnap.length>0?`
        <div style="text-align:left;margin-bottom:8px">
          <div style="font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px">🔔 Últimos avisos</div>
          <div class="kiosk-notif-list">
            ${notifsSnap.map(n=>`<div class="kiosk-notif-item"><strong>${n.de||"Admin"}:</strong> ${n.texto} <span style="color:var(--txt2);font-size:10px">· ${n.fecha}</span></div>`).join("")}
          </div>
        </div>`:""}
      <button class="btn-gold" onclick="kioskVolver()" style="margin-top:4px">✓ Listo</button>
    </div>
  `;
  // Auto-volver después de 12 segundos
  setTimeout(()=>{if(_kioskStep==="result")kioskVolver();},12000);
}

function kioskVolver(){_kioskStep="select";_kioskEmp=null;_kioskPin="";renderKiosk();}
window.kioskVolver=kioskVolver;

function calcKiosk(emp){
  const base=parseFloat(emp.salary)||0;
  const hm=parseInt(emp.horasMes)||160;
  const vac=parseInt(emp.vacDias)||0;
  const diario=base/30;
  const diasBase=Math.min(parseInt(emp.diasTrab)||30,30);
  const diasEfect=Math.max(0,diasBase-vac);
  const proporcional=diario*diasEfect;
  const adelantos=(emp.adelantos||[]).filter(a=>!a.cobrado).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
  const descuentos=(emp.descuentos||[]).filter(d=>!d.cobrado).reduce((s,d)=>s+(parseFloat(d.monto)||0),0);
  const totalBruto=proporcional;
  const quincenaBase=totalBruto/2;
  const quincenaFinal=Math.max(0,quincenaBase-adelantos-descuentos);
  return{quincenaFinal,quincenaBase};
}

function vCronograma(){
  const emps=(S.employees||[]).filter(e=>!e.hidden);
  const cronos=S.cronograma||[];
  const hoy=new Date();
  const semana=[];
  for(let i=0;i<7;i++){
    const d=new Date(hoy);
    d.setDate(hoy.getDate()-hoy.getDay()+i);
    semana.push(d);
  }
  const dias=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];

  return`<div class="page fade-up">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div class="stitle" style="margin:0">Cronograma de la semana</div>
      <button class="ea-btn btn-sm" onclick="openNuevoTurno()">+ Turno</button>
    </div>

    <!-- Weekly grid -->
    <div class="card" style="padding:12px;margin-bottom:12px;overflow-x:auto">
      <div style="display:grid;grid-template-columns:80px repeat(7,1fr);gap:4px;min-width:500px">
        <div></div>
        ${semana.map((d,i)=>`
          <div style="text-align:center;padding:6px 2px;border-radius:8px;background:${d.toDateString()===hoy.toDateString()?"var(--gold)22":"var(--bg2)"};border:1px solid ${d.toDateString()===hoy.toDateString()?"var(--gold)44":"var(--border3)"}">
            <div style="font-size:10px;color:var(--txt2)">${dias[d.getDay()]}</div>
            <div style="font-size:14px;font-weight:700;color:${d.toDateString()===hoy.toDateString()?"var(--gold)":"var(--txt0)"}">${d.getDate()}</div>
          </div>`).join("")}
        ${emps.map(emp=>`
          <div style="display:flex;align-items:center;gap:6px;padding:4px 2px">
            <div style="width:22px;height:22px;border-radius:50%;background:${emp.color}22;color:${emp.color};display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0">${emp.name.charAt(0)}</div>
            <div style="font-size:10px;color:var(--txt1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${emp.name.split(" ")[0]}</div>
          </div>
          ${semana.map(d=>{
            const ds=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
            const turno=cronos.find(t=>t.empId===emp.id&&t.fecha===ds);
            const asist=(emp.asistencia||[]).find(a=>a.fecha===ds);
            return`<div style="padding:3px;text-align:center">
              ${turno?`<div style="background:${emp.color}22;border:1px solid ${emp.color}44;border-radius:6px;padding:3px 2px;font-size:9px;color:${emp.color};cursor:pointer" onclick="verTurno(${emp.id},'${ds}')">${turno.horaInicio}→${turno.horaFin}</div>`
              :`<div style="color:var(--txt2);font-size:10px;cursor:pointer" onclick="openNuevoTurnoFor(${emp.id},'${ds}')">—</div>`}
              ${asist?.entrada?`<div style="font-size:8px;color:var(--ok);margin-top:1px">✓${asist.entrada}</div>`:""}
            </div>`;
          }).join("")}
        `).join("")}
      </div>
    </div>

    <!-- Turnos del día de hoy -->
    <div class="stitle">Hoy — ${dias[hoy.getDay()]} ${hoy.getDate()} de ${MONTHS[hoy.getMonth()]}</div>
    ${(()=>{
      const ds=`${hoy.getFullYear()}-${pad(hoy.getMonth()+1)}-${pad(hoy.getDate())}`;
      const turnosHoy=cronos.filter(t=>t.fecha===ds);
      if(turnosHoy.length===0) return`<div class="card" style="text-align:center;padding:24px;color:var(--txt2);font-size:13px">Sin turnos asignados para hoy.<br><button class="ea-btn btn-sm" onclick="openNuevoTurno()" style="margin-top:10px">+ Asignar turno</button></div>`;
      return turnosHoy.map(t=>{
        const emp=emps.find(e=>e.id===t.empId);
        if(!emp) return "";
        const asist=(emp.asistencia||[]).find(a=>a.fecha===ds);
        return`<div class="card" style="border-color:${emp.color}33;margin-bottom:8px">
          <div style="display:flex;align-items:center;gap:12px">
            <div class="emp-av" style="background:${emp.color}22;color:${emp.color};width:38px;height:38px;font-size:14px">${emp.name.charAt(0)}</div>
            <div style="flex:1">
              <div style="font-size:14px;font-weight:600">${emp.name}</div>
              <div style="font-size:12px;color:var(--txt2)">Turno: <strong style="color:${emp.color}">${t.horaInicio} → ${t.horaFin}</strong>${t.tarea?` · ${t.tarea}`:""}</div>
            </div>
            <div style="text-align:right">
              ${asist?.entrada?`<div class="chip cok" style="font-size:11px">✓ Entró ${asist.entrada}</div>`:`<div class="chip cne">Sin fichar</div>`}
              ${asist?.salida?`<div style="font-size:10px;color:var(--txt2);margin-top:3px">Salida: ${asist.salida}</div>`:""}
            </div>
            <button class="btn-icon btn-danger" onclick="eliminarTurno('${t.id}')" style="width:28px;height:28px;font-size:12px;margin-left:4px">×</button>
          </div>
          ${t.tarea?`<div style="margin-top:8px;padding:8px 10px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--txt1)">📋 Tarea: ${t.tarea}</div>`:""}
        </div>`;
      }).join("");
    })()}

    <!-- Admin: send notification -->
    <div class="card" style="margin-top:4px">
      <div class="stitle">📢 Enviar aviso al equipo</div>
      <div class="fg"><textarea class="fi" id="notif-text" placeholder="Ej: Hay reunión a las 18hs · Revisar stock de góndola 3 · El turno de mañana arranca a las 7am..." style="height:80px;resize:none;font-size:14px"></textarea></div>
      <button class="btn-gold" onclick="enviarNotifAdmin()">Enviar aviso a todos</button>
    </div>
  </div>`;
}

function openNuevoTurno(){
  const emps=(S.employees||[]).filter(e=>!e.hidden);
  const hoy=new Date();
  const ds=`${hoy.getFullYear()}-${pad(hoy.getMonth()+1)}-${pad(hoy.getDate())}`;
  openNuevoTurnoFor(emps[0]?.id||0,ds);
}
window.openNuevoTurno=openNuevoTurno;

function openNuevoTurnoFor(empId,fecha){
  const emps=(S.employees||[]).filter(e=>!e.hidden);
  openBS(`
    <div class="bsheet-hdr"><h3>Asignar turno</h3><button class="btn-icon" onclick="closeBS()">×</button></div>
    <div class="bsheet-body">
      <div class="fg"><label class="fl">Empleado</label>
        <select class="fi" id="t-emp" style="appearance:none">
          ${emps.map(e=>`<option value="${e.id}" ${e.id===empId?"selected":""}>${e.name}</option>`).join("")}
        </select>
      </div>
      <div class="fg"><label class="fl">Fecha</label><input class="fi" id="t-fecha" type="date" value="${fecha}"></div>
      <div class="frow">
        <div class="fg"><label class="fl">Hora inicio</label><input class="fi" id="t-ini" type="time" value="08:00"></div>
        <div class="fg"><label class="fl">Hora fin</label><input class="fi" id="t-fin" type="time" value="17:00"></div>
      </div>
      <div class="fg"><label class="fl">Tarea / descripción (opcional)</label><input class="fi" id="t-tarea" placeholder="Ej: Atención al cliente, reposición..."></div>
    </div>
    <div class="bsheet-foot">
      <button class="btn-sec" style="flex:1" onclick="closeBS()">Cancelar</button>
      <button class="btn-gold" style="flex:2" onclick="guardarTurno()">Guardar turno</button>
    </div>
  `);
}
window.openNuevoTurnoFor=openNuevoTurnoFor;

async function guardarTurno(){
  const empId=parseInt(document.getElementById("t-emp")?.value)||0;
  const fecha=document.getElementById("t-fecha")?.value;
  const horaInicio=document.getElementById("t-ini")?.value;
  const horaFin=document.getElementById("t-fin")?.value;
  const tarea=document.getElementById("t-tarea")?.value||"";
  if(!empId||!fecha||!horaInicio||!horaFin){toast("Completá todos los campos");return;}
  const id="turno_"+Date.now();
  const cronos=[...(S.cronograma||[]).filter(t=>!(t.empId===empId&&t.fecha===fecha)),{id,empId,fecha,horaInicio,horaFin,tarea}];
  await fbSet("cronograma",cronos);
  closeBS();toast("✓ Turno asignado");
}
window.guardarTurno=guardarTurno;

async function eliminarTurno(id){
  if(!confirm("¿Eliminar este turno?"))return;
  const cronos=(S.cronograma||[]).filter(t=>t.id!==id);
  await fbSet("cronograma",cronos);
  toast("✓ Turno eliminado");
}
window.eliminarTurno=eliminarTurno;

function verTurno(empId,fecha){openNuevoTurnoFor(empId,fecha);}
window.verTurno=verTurno;

async function enviarNotifAdmin(){
  const txt=document.getElementById("notif-text")?.value?.trim();
  if(!txt){toast("Escribí un mensaje");return;}
  const notifs=S.notificaciones||[];
  notifs.unshift({texto:txt,fecha:new Date().toLocaleDateString("es-AR"),hora:nowStr(),de:currentUser?.email?.split("@")[0]||"Admin",ts:Date.now()});
  await fbSet("notificaciones",notifs.slice(0,50)); // keep last 50
  document.getElementById("notif-text").value="";
  toast("✅ Aviso enviado a todos los empleados");
}
window.enviarNotifAdmin=enviarNotifAdmin;

  renderNotifs();

    dashboard:vDashboard,calendario:vCalendario,empleados:vEmpleados,

  };
  const fn=views[S.tab];
  document.getElementById("content-area").innerHTML=fn?fn():"";
  document.getElementById("mlabel").textContent=`${MONTHS[S.viewM].slice(0,3).toUpperCase()} ${S.viewY}`;
}
