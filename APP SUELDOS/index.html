<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#080810">
<title>NOMINA AD</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;700&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg0:#080810;--bg1:#0f0f1a;--bg2:#16162a;--bg3:#1e1e35;--bg4:#26263d;
  --gold:#d4a843;--gold2:#f0c96a;--gold3:#a07828;
  --goldg:linear-gradient(135deg,#d4a843 0%,#f0c96a 50%,#a07828 100%);
  --goldgs:linear-gradient(90deg,#d4a843,#f0c96a);
  --ok:#3ecf8e;--danger:#f05252;--warn:#f0a832;--acc:#7c6dfa;--acc2:#5b8af7;
  --txt0:#f2f0ff;--txt1:#8888aa;--txt2:#44445a;
  --border:#1e1e35;--border2:#2a2a45;--border3:#35355a;
  --glow:0 0 0 1px rgba(212,168,67,.08),0 4px 24px rgba(0,0,0,.4);
  --font:'Inter',sans-serif;--display:'Cormorant Garamond',serif;--mono:'JetBrains Mono',monospace;
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --th:62px;--bh:64px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);color:var(--txt0);background:var(--bg0);overscroll-behavior:none}
::-webkit-scrollbar{width:2px}::-webkit-scrollbar-thumb{background:var(--gold3);border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes ripple{0%{transform:scale(0);opacity:.5}100%{transform:scale(4);opacity:0}}
.fade-up{animation:fadeUp .25s ease}

/* ── SCREEN LAYER ── */
.screen{position:fixed;inset:0;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;
  background:radial-gradient(ellipse at 50% 0%,rgba(212,168,67,.07) 0%,transparent 55%),var(--bg0)}
.screen.active{display:flex}

/* ── LANDING ── */
#s-landing .brand{font-family:var(--display);font-size:52px;font-weight:700;letter-spacing:6px;
  background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;background-size:300%;animation:shimmer 5s linear infinite;
  text-align:center;line-height:1}
#s-landing .sub{font-size:10px;color:var(--gold3);letter-spacing:8px;text-transform:uppercase;text-align:center;margin-top:6px;margin-bottom:40px;opacity:.8}
.land-btn{display:flex;align-items:center;gap:16px;padding:18px 22px;width:100%;max-width:360px;
  background:var(--bg1);border:1px solid var(--border3);border-radius:18px;
  cursor:pointer;font-family:var(--font);transition:all .2s;margin-bottom:12px}
.land-btn:hover,.land-btn:active{transform:translateY(-2px)}
.land-btn.admin{border-color:rgba(212,168,67,.3)}
.land-btn.admin:hover{border-color:rgba(212,168,67,.6);box-shadow:0 0 20px rgba(212,168,67,.15)}
.land-btn.emp{border-color:rgba(62,207,142,.3)}
.land-btn.emp:hover{border-color:rgba(62,207,142,.6);box-shadow:0 0 20px rgba(62,207,142,.15)}
.land-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.land-icon.admin{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3)}
.land-icon.emp{background:rgba(62,207,142,.12);border:1px solid rgba(62,207,142,.3)}
.land-lbl{font-size:16px;font-weight:700;text-align:left}
.land-lbl span{display:block;font-size:11px;font-weight:400;color:var(--txt2);margin-top:3px}

/* ── LOGIN BOX ── */
.login-box{width:100%;max-width:380px;background:var(--bg1);border:1px solid var(--border3);border-radius:22px;padding:32px 28px;box-shadow:0 0 0 1px rgba(212,168,67,.05),0 24px 64px rgba(0,0,0,.6)}
.login-title{font-size:13px;font-weight:700;color:var(--gold2);margin-bottom:20px;letter-spacing:.5px}
.back-btn{background:none;border:none;color:var(--txt2);font-size:12px;cursor:pointer;padding:0;font-family:var(--font);margin-bottom:18px;display:flex;align-items:center;gap:4px}

/* ── KIOSK ── */
#s-kiosk{background:radial-gradient(ellipse at 50% -20%,rgba(212,168,67,.1) 0%,transparent 60%),var(--bg0)}
.kiosk-box{width:100%;max-width:360px;background:var(--bg1);border:1px solid var(--border3);border-radius:24px;padding:28px 24px;box-shadow:0 0 0 1px rgba(212,168,67,.06),0 24px 64px rgba(0,0,0,.6)}
.kiosk-clock{font-family:var(--mono);font-size:52px;font-weight:700;color:var(--gold2);text-align:center;letter-spacing:3px;line-height:1;margin-bottom:4px}
.kiosk-date{font-size:13px;color:var(--txt2);text-align:center;margin-bottom:22px}
/* emp grid */
.emp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-height:200px;overflow-y:auto;margin-bottom:14px}
.emp-tile{background:var(--bg2);border:1px solid var(--border3);border-radius:12px;padding:12px 8px;cursor:pointer;text-align:center;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:5px}
.emp-tile:active,.emp-tile.sel{border-color:var(--gold)66;background:rgba(212,168,67,.1)}
.emp-av{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
.emp-nm{font-size:11px;font-weight:600;color:var(--txt0);line-height:1.2}
/* pin pad */
.pin-dots{display:flex;gap:12px;justify-content:center;margin:14px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--border3);transition:all .15s}
.pin-dot.on{background:var(--gold);border-color:var(--gold);box-shadow:0 0 8px rgba(212,168,67,.4)}
.pin-dot.err{background:var(--danger);border-color:var(--danger)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{height:60px;border-radius:14px;border:1px solid var(--border3);background:var(--bg2);color:var(--txt0);font-size:24px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:var(--mono);transition:all .12s;-webkit-user-select:none;user-select:none}
.pin-key:active{background:rgba(212,168,67,.18);border-color:rgba(212,168,67,.5);transform:scale(.91)}
.pin-key.del{font-size:18px;color:var(--txt2)}
.pin-key.del:active{background:rgba(240,82,82,.15);border-color:rgba(240,82,82,.4);color:var(--danger)}
.pin-key.empty{opacity:0;pointer-events:none}
.pin-err{font-size:12px;color:var(--danger);text-align:center;min-height:18px;margin-top:6px}
/* result */
.kiosk-result{text-align:center;padding:8px 0}
.res-icon{font-size:60px;line-height:1;margin-bottom:10px}
.res-title{font-size:20px;font-weight:700;margin-bottom:4px}
.res-sub{font-size:13px;color:var(--txt2);margin-bottom:16px;line-height:1.5}
.cobro-mini{background:var(--bg2);border:1px solid rgba(212,168,67,.3);border-radius:12px;padding:14px;margin-bottom:12px;text-align:left}
.notif-mini{max-height:150px;overflow-y:auto}
.notif-mini-item{padding:8px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--txt1);line-height:1.5}
.notif-mini-item:last-child{border-bottom:none}
.notif-mini-item strong{color:var(--txt0)}

/* ── APP ── */
#s-app{padding:0;justify-content:flex-start;align-items:stretch;z-index:5}
#s-app.active{display:flex}
/* topbar */
#topbar{height:var(--th);flex-shrink:0;background:rgba(10,10,22,.95);backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border3);display:flex;align-items:center;padding:0 16px;gap:10px;
  position:relative;z-index:20;padding-top:var(--sat)}
#topbar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)50,transparent);opacity:.5}
.tb-brand{font-family:var(--display);font-size:22px;font-weight:700;letter-spacing:4px;
  background:var(--goldg);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;background-size:300%;animation:shimmer 6s linear infinite}
.tb-mid{flex:1;display:flex;align-items:center;justify-content:center;gap:6px}
.tb-month-btn{background:none;border:none;color:var(--txt1);font-size:18px;cursor:pointer;padding:4px 8px;border-radius:8px}
.tb-month-btn:active{color:var(--gold)}
.tb-mlabel{font-size:12px;font-weight:600;font-family:var(--mono);color:var(--gold2);min-width:100px;text-align:center;letter-spacing:.8px}
.tb-btn{width:38px;height:38px;background:var(--bg3);border:1px solid var(--border3);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;flex-shrink:0;transition:all .15s}
.tb-btn:active{background:rgba(212,168,67,.15);border-color:rgba(212,168,67,.5)}
/* content */
#content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.page{padding:14px;animation:fadeUp .25s ease}
/* bottom tabs */
#tabs{height:var(--bh);flex-shrink:0;background:rgba(8,8,16,.98);backdrop-filter:blur(20px);
  border-top:1px solid var(--border3);display:flex;align-items:stretch;
  position:relative;z-index:20;padding-bottom:var(--sab)}
#tabs::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)50,transparent);opacity:.6}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;
  border:none;background:none;cursor:pointer;font-size:10px;color:var(--txt2);font-family:var(--font);font-weight:500;transition:color .15s;padding:6px 0}
.tab .ti{font-size:22px;transition:transform .15s}
.tab.on{color:var(--gold2)}
.tab.on .ti{transform:translateY(-1px)}

/* ── CARDS ── */
.card{background:var(--bg1);border:1px solid var(--border3);border-radius:16px;padding:16px;position:relative;overflow:hidden;margin-bottom:12px;box-shadow:var(--glow)}
.card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)40,transparent);opacity:.5}
.csm{background:var(--bg2);border:1px solid var(--border3);border-radius:12px;padding:12px 14px}
.stitle{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:2px;font-weight:700;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}

/* stat card */
.stat{background:var(--bg1);border:1px solid var(--border3);border-radius:14px;padding:14px;position:relative;overflow:hidden;box-shadow:var(--glow)}
.stat::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)40,transparent);opacity:.5}
.stat-lbl{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;font-weight:600}
.stat-val{font-size:20px;font-weight:700;font-family:var(--mono)}

/* pay card */
.pay-card{background:var(--bg1);border:1px solid var(--border3);border-radius:16px;padding:18px;position:relative;overflow:hidden;box-shadow:var(--glow);transition:all .2s}
.pay-card::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)50,transparent)}
.pay-card:hover{transform:translateY(-2px)}
.pbar{background:var(--bg4);border-radius:99px;height:4px;overflow:hidden}
.pfill{height:100%;border-radius:99px;transition:width .5s}

/* emp card */
.ecard{background:var(--bg1);border:1px solid var(--border3);border-radius:16px;padding:16px;margin-bottom:10px;position:relative;overflow:hidden;box-shadow:var(--glow)}
.ecard::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold)30,transparent);opacity:.5}

/* table */
.tbl{width:100%;border-collapse:collapse}
.tbl th{font-size:9px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;padding:8px 10px;text-align:left;border-bottom:1px solid var(--border3);font-weight:600}
.tbl td{padding:10px 10px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tbody tr:hover td{background:var(--bg2)}

/* chips */
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.4px}
.cok{background:rgba(62,207,142,.12);color:var(--ok);border:1px solid rgba(62,207,142,.25)}
.cdn{background:rgba(240,82,82,.12);color:var(--danger);border:1px solid rgba(240,82,82,.25)}
.cwn{background:rgba(240,168,50,.12);color:var(--warn);border:1px solid rgba(240,168,50,.25)}
.cinf{background:rgba(91,138,247,.12);color:var(--acc2);border:1px solid rgba(91,138,247,.25)}
.cne{background:var(--bg3);color:var(--txt2);border:1px solid var(--border3)}
.cgold{background:rgba(212,168,67,.12);color:var(--gold2);border:1px solid rgba(212,168,67,.25)}

/* pay button */
.pay-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border3);background:var(--bg2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--gold);transition:all .15s}
.pay-btn.paid{background:rgba(62,207,142,.12);border-color:rgba(62,207,142,.4);color:var(--ok)}

/* ea buttons */
.ea-btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border3);background:var(--bg2);color:var(--txt1);font-family:var(--font);transition:all .15s}
.ea-btn:active,.ea-btn:hover{border-color:rgba(212,168,67,.4);color:var(--gold2)}
.ea-btn.on{background:rgba(212,168,67,.12);border-color:rgba(212,168,67,.4);color:var(--gold2)}
.ea-btn.danger{color:var(--danger);border-color:rgba(240,82,82,.3)}
.ea-btn.danger:hover{background:rgba(240,82,82,.08)}

/* forms */
.fg{margin-bottom:12px}
.fl{font-size:10px;color:var(--txt2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:5px;display:block;font-weight:600}
.fi{width:100%;background:var(--bg2);border:1px solid var(--border3);border-radius:10px;color:var(--txt0);padding:11px 14px;font-size:15px;outline:none;font-family:var(--font);-webkit-appearance:none;appearance:none;transition:border-color .2s,box-shadow .2s}
.fi:focus{border-color:rgba(212,168,67,.5);box-shadow:0 0 0 3px rgba(212,168,67,.1)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.fhint{font-size:11px;color:var(--txt1);margin-top:6px;padding:8px 12px;background:var(--bg2);border-radius:8px;border-left:2px solid var(--gold3);font-family:var(--mono)}

/* buttons */
.btn-gold{display:flex;align-items:center;justify-content:center;gap:8px;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;font-family:var(--font);background:var(--goldgs);color:#000;width:100%;box-shadow:0 4px 16px rgba(212,168,67,.25);transition:all .2s}
.btn-gold:active{opacity:.85;transform:scale(.98)}
.btn-sec{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:1px solid var(--border3);font-family:var(--font);background:var(--bg2);color:var(--txt1);width:100%;transition:all .15s}
.btn-sec:active,.btn-sec:hover{border-color:rgba(212,168,67,.4);color:var(--gold2)}
.btn-icon{width:34px;height:34px;border-radius:9px;border:1px solid var(--border3);background:var(--bg2);color:var(--txt2);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;transition:all .15s}
.btn-icon:hover{border-color:rgba(212,168,67,.4);color:var(--gold)}

/* bsheet */
#bsheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:100;display:none;flex-direction:column;justify-content:flex-end;backdrop-filter:blur(4px)}
#bsheet-overlay.open{display:flex}
.bsheet{background:var(--bg1);border-radius:22px 22px 0 0;max-height:88vh;overflow-y:auto;position:relative;padding-bottom:calc(20px + var(--sab))}
.bsheet::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--goldgs);border-radius:22px 22px 0 0}
.bsh{width:36px;height:4px;background:var(--border3);border-radius:99px;margin:12px auto 0}
.bsheet-hdr{padding:10px 18px 0;display:flex;align-items:center;justify-content:space-between}
.bsheet-hdr h3{font-size:15px;font-weight:700}
.bsheet-body{padding:14px 18px}
.bsheet-foot{padding:0 18px;display:flex;gap:8px;margin-top:6px}

/* connection badge */
#conn{position:fixed;bottom:calc(var(--bh) + 8px);right:10px;z-index:50;display:flex;align-items:center;gap:6px;background:rgba(14,14,26,.9);backdrop-filter:blur(10px);border:1px solid var(--border3);border-radius:99px;padding:5px 12px;font-size:11px;font-family:var(--mono);display:none}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--ok)}
.conn-dot.off{background:var(--danger)}
.conn-dot.sync{background:var(--warn);animation:spin 1s linear infinite}

/* toast */
.toast{position:fixed;bottom:calc(var(--bh) + 14px);left:50%;transform:translateX(-50%);background:var(--bg2);border:1px solid rgba(212,168,67,.4);border-radius:20px;padding:10px 20px;font-size:12px;font-family:var(--font);color:var(--gold);box-shadow:0 4px 20px rgba(0,0,0,.5);font-weight:600;white-space:nowrap;max-width:90vw;text-align:center;animation:fadeUp .2s ease;z-index:200}

/* loader */
.loader{width:28px;height:28px;border:3px solid var(--border3);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite;margin:40px auto}

/* calendar */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hdr{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.cal-dh{text-align:center;font-size:9px;color:var(--txt2);font-weight:700;padding:2px;letter-spacing:.5px}
.cal-d{text-align:center;padding:5px 2px;border-radius:5px;font-size:11px}
.cal-d.pay{background:var(--goldgs);color:#000;font-weight:700}
.cal-d.today{background:var(--bg3);color:var(--gold2);font-weight:700;border:1px solid rgba(212,168,67,.3)}
.cal-d.hol{color:var(--danger)}
.cal-d.wkd{color:var(--txt2)}
.cal-d.wkk{color:var(--txt1)}

/* cronograma */
.crono-cell{padding:3px;text-align:center}
.turno-chip{background:rgba(212,168,67,.12);border:1px solid rgba(212,168,67,.3);border-radius:5px;padding:2px 3px;font-size:9px;color:var(--gold2);cursor:pointer;line-height:1.3}

/* desktop sidebar */
@media(min-width:768px){
  #s-app{flex-direction:row}
  #tabs{flex-direction:column;width:84px;height:auto;border-top:none;border-right:1px solid var(--border3);order:-1;flex-shrink:0;overflow-y:auto;padding-bottom:0}
  #tabs::before{display:none}
  #tabs::after{content:'';position:absolute;top:0;right:0;bottom:0;width:1px;background:linear-gradient(180deg,transparent,var(--gold)40,transparent)}
  .tab{flex-direction:column;gap:4px;padding:15px 4px;font-size:9px;border-left:3px solid transparent;border-bottom:none;min-height:74px}
  .tab.on{border-left-color:var(--gold);background:linear-gradient(90deg,rgba(212,168,67,.08),transparent)}
  .tab.on .ti{transform:none}
  .tab .ti{font-size:23px}
  #content{overflow-x:hidden}
  #topbar{padding-top:0}
  #conn{left:94px;bottom:12px}
}
@media(min-width:1024px){
  #tabs{width:100px}
  .tab{font-size:10px;padding:16px 6px}
}
@media(min-width:1280px){
  #tabs{width:116px}
  .tab{font-size:11px;padding:18px 8px}
  .tab .ti{font-size:26px}
}
</style>
</head>
<body>

<!-- ════════════════ LANDING ════════════════ -->
<div id="s-landing" class="screen active">
  <div class="brand">NOMINA AD</div>
  <div class="sub">Gestión de Sueldos</div>
  <button class="land-btn admin" onclick="showScreen('s-login')">
    <div class="land-icon admin">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" style="color:#d4a843">
        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

// ══════════════════ CONFIG ══════════════════
const FB_URL = "https://app-sueldos-1799b-default-rtdb.firebaseio.com";
const ROOM   = "sueldos2025";
const FB_CFG = {
  apiKey:"AIzaSyB75ycZYRmwrlMg0bTtUc5dGlA7XA5d7OU",
  authDomain:"app-sueldos-1799b.firebaseapp.com",
  databaseURL:FB_URL,

  appId:"1:584807278158:web:7b2bfbf798e80dae1e851f"
};

// ══════════════════ CONSTANTS ══════════════════
const MONTHS=["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
const DSHORT=["Dom","Lun","Mar","Mié","Jue","Vie","Sáb"];
const DLONG=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const COLORS=["#d4a843","#3ecf8e","#7c6dfa","#f05252","#f0a832","#5b8af7","#fa8c5b","#a07828","#4ecdc4","#ff6b9d"];
const HOLIDAYS=new Set(["2025-01-01","2025-03-03","2025-03-04","2025-04-02","2025-04-18","2025-05-01","2025-05-25","2025-06-16","2025-06-20","2025-07-09","2025-08-17","2025-10-12","2025-11-20","2025-12-08","2025-12-25","2026-01-01","2026-02-16","2026-02-17","2026-04-02","2026-04-03","2026-05-01","2026-05-25","2026-06-15","2026-06-20","2026-07-09","2026-08-17","2026-10-12","2026-11-20","2026-12-08","2026-12-25"]);

// ══════════════════ HELPERS ══════════════════
const pad = n => String(n).padStart(2,"0");
const toKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const isHol = d => HOLIDAYS.has(toKey(d));
const isWork = d => d.getDay()!==0 && d.getDay()!==6 && !isHol(d);
const todayStr = () => { const n=new Date(); return `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())}`; };
const nowStr = () => { const n=new Date(); return `${pad(n.getHours())}:${pad(n.getMinutes())}`; };
const parseMin = t => { if(!t) return null; const[h,m]=t.split(":").map(Number); return h*60+m; };
const diffH = (e,s) => { const ev=parseMin(e),sv=parseMin(s); if(!ev||!sv||sv<=ev) return 0; return (sv-ev)/60; };
const fmtH = h => { const hrs=Math.floor(h),mins=Math.round((h-hrs)*60); return `${hrs}h${mins>0?" "+mins+"m":""}`; };
const fmtM = n => (n===null||n===undefined||isNaN(n))?"—":"$"+Math.round(n).toLocaleString("es-AR");
const fmtD = d => d?`${DSHORT[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()].slice(0,3)}`:"—";
const TODAY = new Date(); TODAY.setHours(0,0,0,0);
const dUntil = d => d ? Math.round((d-TODAY)/86400000) : null;

function getPayDate(y,m,q){
  const s=q===1?1:16, e=q===1?15:new Date(y,m+1,0).getDate();
  let n=0;
  for(let d=s;d<=e;d++){const dt=new Date(y,m,d);if(isWork(dt)){n++;if(n===4)return dt;}}
  return null;
}

// ══════════════════ STATE ══════════════════
let db=null, auth=null;
let currentUser=null, currentRole="viewer", _ready=false;
let S = {
  tab:"dashboard", viewY:TODAY.getFullYear(), viewM:TODAY.getMonth(),
  search:"",
  employees:[], paid:{}, historial:[], companies:[], cronograma:[], notificaciones:[]
};

// ══════════════════ SCREEN MANAGER ══════════════════
function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>{s.classList.remove("active");});
  document.getElementById(id).classList.add("active");
}
window.showScreen=showScreen;

// ══════════════════ INIT ══════════════════
window.addEventListener("load",()=>{
  const app = initializeApp(FB_CFG,"nominaad");
  db  = getDatabase(app);
  auth = getAuth(app);

  // Auth state
  onAuthStateChanged(auth, async user => {
    if(user){
      currentUser=user;
      // Load role
      try{
        const snap = await get(ref(db,`nomina/${ROOM}/users/${user.uid}`));
        const data = snap.val()||{};
        currentRole = data.role||"admin";
        if(!snap.val()){
          // First user → admin
          await set(ref(db,`nomina/${ROOM}/users/${user.uid}`),{name:user.email,email:user.email,role:"admin",ts:Date.now()});
          currentRole="admin";
        }
      }catch(e){ currentRole="admin"; }
      // Start sync
      iniciarSync();
      showScreen("s-app");
    }else{
      currentUser=null; currentRole="viewer"; _ready=false;
      document.getElementById("conn").style.display="none";
      showScreen("s-landing");
    }
  });
});

// ══════════════════ FIREBASE SYNC ══════════════════
function iniciarSync(){
  const rRef = ref(db,`nomina/${ROOM}`);
  setConn("sync");
  onValue(rRef, snap=>{
    const data = snap.val()||{};
    S.companies   = data.companies   ? (Array.isArray(data.companies)?data.companies:Object.values(data.companies)) : [];
    S.employees   = data.employees   ? (Array.isArray(data.employees)?data.employees:Object.values(data.employees)) : [];
    S.paid        = data.paid        || {};
    S.historial   = data.historial   ? (Array.isArray(data.historial)?data.historial:Object.values(data.historial)) : [];
    S.cronograma  = data.cronograma  ? (Array.isArray(data.cronograma)?data.cronograma:Object.values(data.cronograma)) : [];
    S.notificaciones = data.notificaciones ? (Array.isArray(data.notificaciones)?data.notificaciones:Object.values(data.notificaciones)).sort((a,b)=>(b.ts||0)-(a.ts||0)) : [];
    if(!S.companies.length) S.companies=[{id:1,name:"Mi Empresa",cuit:""}];
    setConn("on");
    _ready=true;
    render();
    // Show conn badge
    const connEl=document.getElementById("conn");
    connEl.style.display="flex";
    const uname=currentUser?.email?.split("@")[0]||"";
    document.getElementById("conn-lbl").textContent=uname;
  }, err=>{ setConn("off"); });
}

function setConn(st){
  const dot=document.getElementById("conn-dot");
  if(!dot)return;
  dot.className="conn-dot"+(st==="off"?" off":st==="sync"?" sync":"");
}

async function fbSet(path,val){
  setConn("sync");
  await set(ref(db,`nomina/${ROOM}/${path}`),val);
  setConn("on");
}

// ══════════════════ AUTH FUNCTIONS ══════════════════
window.togglePass=()=>{
  const i=document.getElementById("l-pass"),e=document.getElementById("pass-eye");
  i.type=i.type==="password"?"text":"password";
  e.textContent=i.type==="password"?"👁":"🙈";
};
window.toggleLF=mode=>{
  document.getElementById("lf-main").style.display=mode==="main"?"block":"none";
  document.getElementById("lf-reg").style.display=mode==="reg"?"block":"none";
};
window.doLogin=async()=>{
  const email=document.getElementById("l-email").value.trim();
  const pass=document.getElementById("l-pass").value;
  const err=document.getElementById("l-err"); err.style.display="none";
  if(!email||!pass){err.textContent="Completá email y contraseña";err.style.display="block";return;}
  try{ await signInWithEmailAndPassword(auth,email,pass); }
  catch(e){
    const m={"auth/invalid-credential":"Email o contraseña incorrectos.","auth/user-not-found":"No existe esa cuenta.","auth/wrong-password":"Contraseña incorrecta.","auth/too-many-requests":"Demasiados intentos. Esperá unos minutos."};
    err.textContent=m[e.code]||"Error: "+e.message; err.style.display="block";
  }
};
window.doRegister=async()=>{
  const name=document.getElementById("r-name").value.trim();
  const email=document.getElementById("r-email").value.trim();
  const pass=document.getElementById("r-pass").value;
  const role=document.getElementById("r-role").value;
  const err=document.getElementById("r-err"),ok=document.getElementById("r-ok");
  err.style.display="none"; ok.style.display="none";
  if(!name||!email||!pass){err.textContent="Completá todos los campos";err.style.display="block";return;}
  if(pass.length<6){err.textContent="Contraseña mínimo 6 caracteres";err.style.display="block";return;}
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await set(ref(db,`nomina/${ROOM}/users/${cred.user.uid}`),{name,email,role,ts:Date.now()});
    ok.textContent=`✓ Cuenta creada para ${name}`;ok.style.display="block";
    ["r-name","r-email","r-pass"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  }catch(e){
    const m={"auth/email-already-in-use":"Ya existe una cuenta con ese email.","auth/weak-password":"Contraseña muy débil."};
    err.textContent=m[e.code]||"Error: "+e.message; err.style.display="block";
  }
};
window.doReset=async()=>{
  const email=document.getElementById("l-email").value.trim();
  const err=document.getElementById("l-err");
  if(!email){err.textContent="Ingresá tu email primero";err.style.display="block";return;}
  try{
    await sendPasswordResetEmail(auth,email);
    err.style.cssText="display:block;margin-top:10px;padding:10px;background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);border-radius:10px;font-size:12px;color:var(--ok)";
    err.textContent="✓ Email de recuperación enviado";
  }catch(e){ err.textContent="Error: "+e.message; err.style.display="block"; }
};
window.doLogout=async()=>{
  await signOut(auth);
};

// ══════════════════ KIOSK ══════════════════
let _kStep="select", _kEmp=null, _kPin="", _kClockInt=null;

window.abrirKiosk = () => {
  showScreen("s-kiosk");
  _kStep="select"; _kEmp=null; _kPin="";
  iniciarKioskClock();
  // Load employees from Firebase for kiosk (no auth needed)
  if(_ready && S.employees.length){
    renderKiosk();
  } else {
    // Fetch directly without auth
    get(ref(db,`nomina/${ROOM}/employees`)).then(snap=>{
      const data=snap.val();
      if(data) S.employees=Array.isArray(data)?data:Object.values(data);
      renderKiosk();
    }).catch(()=>{
      document.getElementById("kiosk-content").innerHTML=`<div style="text-align:center;padding:20px;color:var(--txt2);font-size:13px">Error cargando empleados.<br>Verificá la conexión a internet.</div>`;
    });
  }
};

window.cerrarKiosk = () => {
  clearInterval(_kClockInt);
  showScreen(_ready?"s-app":"s-landing");
};

function iniciarKioskClock(){
  clearInterval(_kClockInt);
  const tick=()=>{
    const n=new Date();
    const cl=document.getElementById("kiosk-clock");
    const da=document.getElementById("kiosk-date");
    if(cl) cl.textContent=`${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
    if(da) da.textContent=`${DLONG[n.getDay()]} ${n.getDate()} de ${MONTHS[n.getMonth()]} ${n.getFullYear()}`;
  };
  tick(); _kClockInt=setInterval(tick,1000);
}

function renderKiosk(){
  const box=document.getElementById("kiosk-content"); if(!box)return;
  if(_kStep==="select") box.innerHTML=kStep1();
  else if(_kStep==="pin") box.innerHTML=kStep2();
  else if(_kStep==="result") box.innerHTML=kStep3();
}

function kStep1(){
  const emps=(S.employees||[]).filter(e=>!e.hidden);
  if(!emps.length) return`<div style="text-align:center;padding:20px;color:var(--txt2);font-size:13px">Sin empleados registrados.<br>El administrador debe agregar empleados primero.</div>`;

      ?`<button class="btn-gold" onclick="kContinuar()">Continuar →</button>`
      :`<div style="text-align:center;font-size:12px;color:var(--txt2)">Seleccioná tu nombre</div>`}
  `;
}

function kStep2(){
  const e=_kEmp;
  return`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
      <div class="emp-av" style="background:${e.color}22;color:${e.color};border:1px solid ${e.color}44;width:38px;height:38px">${e.name.charAt(0)}</div>
      <div>
        <div style="font-size:14px;font-weight:600">${e.name}</div>

      </div>
    </div>
    <div class="pin-dots" id="k-dots">
      ${[0,1,2,3].map(i=>`<div class="pin-dot${_kPin.length>i?" on":""}" id="kd${i}"></div>`).join("")}
    </div>
    <div class="pin-pad">
      ${[1,2,3,4,5,6,7,8,9].map(n=>`<button class="pin-key" onclick="kKey(${n})">${n}</button>`).join("")}
      <button class="pin-key empty"></button>
      <button class="pin-key" onclick="kKey(0)">0</button>
      <button class="pin-key del" onclick="kDel()">⌫</button>
    </div>
    <div class="pin-err" id="k-err"></div>
    <button class="btn-sec" onclick="kVolver()" style="margin-top:12px;font-size:12px;padding:8px">← Volver</button>
  `;
}

async function kStep3Build(){
  const e=_kEmp;
  const hoy=todayStr();
  const asist=[...(e.asistencia||[])];
  const idx=asist.findIndex(r=>r.fecha===hoy);
  const now=nowStr();
  let accion="", icon="", color="", msgSub="";

  if(idx===-1){
    asist.push({fecha:hoy,entrada:now,salida:null,descanso:30,nota:"",ficherado:true});
    accion="ENTRADA"; icon="🟢"; color="var(--ok)";
    msgSub=`¡Hola <strong>${e.name.split(" ")[0]}</strong>! Entrada registrada a las <strong style="color:var(--ok)">${now}</strong>`;
  } else if(!asist[idx].salida){
    asist[idx]={...asist[idx],salida:now};
    const h=diffH(asist[idx].entrada,asist[idx].salida)-((asist[idx].descanso||30)/60);
    accion="SALIDA"; icon="🔴"; color="var(--danger)";
    msgSub=`¡Hasta luego <strong>${e.name.split(" ")[0]}</strong>! Salida: <strong style="color:var(--danger)">${now}</strong>${h>0?` · Trabajaste ${fmtH(Math.max(0,h))}`:""}<br><span style="font-size:11px;color:var(--txt2)">El admin revisará si fue hora extra.</span>`;
  } else {
    accion="YA REGISTRADO"; icon="✅"; color="var(--gold)";
    msgSub=`Ya registraste tu jornada de hoy.<br>${asist[idx].entrada?`Entrada: ${asist[idx].entrada}`:""}${asist[idx].salida?` · Salida: ${asist[idx].salida}`:""}`;

// ══════════════════ CALC ══════════════════
function calc(emp){
  const base=parseFloat(emp.salary)||0;
  const hm=parseInt(emp.horasMes)||160;
  const vac=parseInt(emp.vacDias)||0;
  const diario=base/30;
  const valorH=base/hm;
  const horasPactDia=hm/30;
  const lastDay=new Date(S.viewY,S.viewM+1,0).getDate();

  // Count franco days this month from cronograma — francos no se pagan
  const francosDias=(S.cronograma||[]).filter(t=>{
    if(!t.franco||t.empId!==emp.id) return false;
    const d=new Date(t.fecha+"T00:00:00");
    return d.getFullYear()===S.viewY&&d.getMonth()===S.viewM;
  }).length;

  let totalDias=Math.min(parseInt(emp.diasTrab)||30,30);
  // Subtract franco days from working days
  totalDias=Math.max(0,totalDias-francosDias);

  let esNuevo=false,diaIngreso=null,diasQ1=0,diasQ2=0;
  if(emp.fechaIngreso){
    const fi=new Date(emp.fechaIngreso+"T00:00:00");
    if(fi.getFullYear()===S.viewY&&fi.getMonth()===S.viewM){
      diaIngreso=fi.getDate(); esNuevo=true;
      totalDias=Math.min(lastDay-diaIngreso+1,30);
      if(diaIngreso<=15){diasQ1=15-diaIngreso+1;diasQ2=lastDay-15;}
      else{diasQ1=0;diasQ2=lastDay-diaIngreso+1;}
    }else{diasQ1=15;diasQ2=lastDay-15;}
  }else{diasQ1=15;diasQ2=lastDay-15;}
  const diasEf=Math.max(0,totalDias-vac);
  const prop=diario*diasEf;
  const extras=(emp.extras||[]).reduce((s,ex)=>s+valorH*(parseFloat(ex.horas)||0),0);
  const adelantos=(emp.adelantos||[]).filter(a=>!a.cobrado).reduce((s,a)=>s+(parseFloat(a.monto)||0),0);
  const descuentos=(emp.descuentos||[]).filter(d=>!d.cobrado).reduce((s,d)=>s+(parseFloat(d.monto)||0),0);
  const bruto=prop+extras;
  // Q1/Q2 proportional amounts — descontando francos por quincena
  const francosQ1=(S.cronograma||[]).filter(t=>{
    if(!t.franco||t.empId!==emp.id) return false;
    const d=new Date(t.fecha+"T00:00:00");
    return d.getFullYear()===S.viewY&&d.getMonth()===S.viewM&&d.getDate()<=15;
  }).length;
  const francosQ2=(S.cronograma||[]).filter(t=>{
    if(!t.franco||t.empId!==emp.id) return false;
    const d=new Date(t.fecha+"T00:00:00");
    return d.getFullYear()===S.viewY&&d.getMonth()===S.viewM&&d.getDate()>15;
  }).length;

  let propQ1=0,propQ2=0;
  if(esNuevo){
    propQ1=diaIngreso<=15?diario*Math.max(0,diasQ1-francosQ1):0;
    propQ2=diario*Math.max(0,diasQ2-francosQ2);
  }else{
    propQ1=diario*Math.max(0,15-francosQ1);
    propQ2=diario*Math.max(0,(lastDay-15)-francosQ2);
  }
  // If Q1 not yet paid and employee is new mid-Q1, accumulate into Q2
  const mkK=(q)=>S.viewY+"-"+S.viewM+"-"+emp.id+"-"+q;
  const q1Paid=!!(S.paid&&S.paid[mkK(1)]);
  const acumQ1EnQ2=(esNuevo&&diaIngreso>1&&diaIngreso<=15&&!q1Paid)?propQ1:0;
  const propQ2Total=propQ2+acumQ1EnQ2+extras;
  const ded=adelantos+descuentos;
  const qFinal1=Math.max(0,propQ1-ded/2);
  const qFinal2=Math.max(0,propQ2Total-ded/2);
  const qFinal=(qFinal1+qFinal2)/2;
  const qCompleta=base/2;
  return{base,diario,valorH,horasPactDia,totalDias,diasEf,vac,prop,extras,bruto,
    propQ1,propQ2,propQ2Total,qFinal1,qFinal2,qFinal,adelantos,descuentos,
    esNuevo,diaIngreso,diasQ1,diasQ2,acumQ1EnQ2,qCompleta,
    francosDias,francosQ1,francosQ2};
}
// Asistencia del mes actual
function calcAsist(emp){
  const Y=S.viewY,M=S.viewM;
  const regs=(emp.asistencia||[]).filter(r=>{
    const d=new Date(r.fecha+"T00:00:00");
    return d.getFullYear()===Y&&d.getMonth()===M;
  });
  const hpd=(parseInt(emp.horasMes)||160)/30;
  let dias=0,totalH=0,extras=0;
  regs.forEach(r=>{
    if(r.entrada&&r.salida){
      dias++;
      const h=Math.max(0,diffH(r.entrada,r.salida)-((r.descanso||30)/60));
      totalH+=h; extras+=Math.max(0,h-hpd);
    }
  });
  return{regs,dias,totalH,extras,hpd};
}

window.togglePaidUI=async(id,q)=>{
  const mkKey=(id,q)=>`${S.viewY}-${S.viewM}-${id}-${q}`;
  const was=S.paid[mkKey(id,q)];
  const newPaid={...S.paid,[mkKey(id,q)]:!was};
  if(!was){
    const emp=S.employees.find(e=>e.id===id);
    if(emp){
      const c=calc(emp);
      const hist=[...S.historial,{empId:id,empName:emp.name,empColor:emp.color,
        concepto:`${q===1?"1ra":"2da"} Quincena — ${MONTHS[S.viewM]} ${S.viewY}`,
        monto:q===1?c.qFinal1:c.qFinal2,fecha:new Date().toLocaleDateString("es-AR"),_ts:Date.now()}];
      await fbSet("historial",hist);
    }
  }
  await fbSet("paid",newPaid);
};

function liveCalc(p){
  const sal=parseFloat(document.getElementById(`${p}sal`)?.value)||0;
  const hm=parseInt(document.getElementById(`${p}hm`)?.value)||160;
  const dt=parseInt(document.getElementById(`${p}dt`)?.value)||30;
  const vd=parseInt(document.getElementById(`${p}vd`)?.value)||0;
  const el=document.getElementById(`${p}prev`); if(!el)return;
  if(!sal){el.textContent="Ingresá el sueldo para ver el cálculo";return;}
  const d=sal/30,h=sal/hm,ef=Math.min(dt,30)-vd,prop=d*Math.max(0,ef),q=prop/2;
  el.innerHTML=`Diario: <strong style="color:var(--gold)">${fmtM(d)}</strong>  ·  Hora: <strong style="color:var(--gold2)">${fmtM(h)}</strong>  ·  Quincena: <strong style="color:var(--gold)">${fmtM(q)}</strong>`;
}
window.liveCalc=liveCalc;

  _repeat=mode;
  ["dia","semana","mes","rango"].forEach(m=>{const el=document.getElementById("rb_"+m);if(el)el.classList.toggle("on",m===mode);});
  document.getElementById("t_fecha_fin_row").style.display=(mode==="dia"||mode==="semana"||mode==="mes")?"none":"block";

window.guardarTurno=async()=>{
  const empId=parseInt(document.getElementById("t_emp")?.value)||0;
  const fechaInicio=document.getElementById("t_fecha")?.value;
  const horaInicio=document.getElementById("t_ini")?.value||"08:00";
  const horaFin=document.getElementById("t_fin")?.value||"16:00";
  const tarea=document.getElementById("t_tarea")?.value||"";
  const isFranco=document.getElementById("t_is_franco")?.value==="1";
  if(!empId||!fechaInicio){toast("Selecciona empleado y fecha");return;}

  // Build date range
  const fechas=[];
  const fStart=new Date(fechaInicio+"T00:00:00");
  let fEnd=new Date(fStart);
  if(_repeat==="semana"){
    // rest of this week (Mon-Sun)
    const dow=fStart.getDay();
    fEnd=new Date(fStart);fEnd.setDate(fStart.getDate()+(6-dow));
  } else if(_repeat==="mes"){
    fEnd=new Date(fStart.getFullYear(),fStart.getMonth()+1,0);
  } else if(_repeat==="rango"){
    const ff=document.getElementById("t_fecha_fin")?.value;
    if(ff) fEnd=new Date(ff+"T00:00:00");
  }

  for(let d=new Date(fStart);d<=fEnd;d.setDate(d.getDate()+1)){
    fechas.push(toKey(new Date(d)));
  }

  // Remove existing, add new
  let cronos=[...(S.cronograma||[]).filter(t=>!(t.empId===empId&&fechas.includes(t.fecha)))];
  fechas.forEach(f=>{
    cronos.push({
      id:"t"+Date.now()+Math.random().toString(36).slice(2,7),
      empId,fecha:f,horaInicio:isFranco?"FRANCO":horaInicio,
      horaFin:isFranco?"FRANCO":horaFin,tarea,franco:isFranco
    });
  });
  await fbSet("cronograma",cronos);
  closeBS();
  toast(`${fechas.length} dia${fechas.length!==1?"s":""} asignados${isFranco?" (franco)":""}`);
  _repeat="dia";
};
window.eliminarTurno=async id=>{
  if(!confirm("¿Eliminar este turno?"))return;
  const cronos=(S.cronograma||[]).filter(t=>t.id!==id);
  await fbSet("cronograma",cronos); toast("✓ Turno eliminado");
};
window.enviarNotif=async()=>{
  const txt=document.getElementById("notif-txt")?.value?.trim();
  if(!txt){toast("Escribí un mensaje");return;}
  const notifs=[{texto:txt,fecha:new Date().toLocaleDateString("es-AR"),hora:nowStr(),de:currentUser?.email?.split("@")[0]||"Admin",ts:Date.now()},...(S.notificaciones||[])].slice(0,50);
  await fbSet("notificaciones",notifs);
  document.getElementById("notif-txt").value="";
  toast("✅ Aviso enviado");
};

// ══════════════════ CREATE ACCOUNT ══════════════════
window.openCrearCuenta=()=>{
  if(currentRole!=="admin"){toast("Solo admins pueden crear cuentas");return;}
  openBS(`
    <div class="bsheet-hdr"><h3>Crear usuario nuevo</h3><button class="btn-icon" onclick="closeBS()">×</button></div>
    <div class="bsheet-body">
      <div class="fg"><label class="fl">Nombre</label><input class="fi" id="cc_name" placeholder="Juan Pérez"></div>
      <div class="fg"><label class="fl">Email</label><input class="fi" id="cc_email" type="email" placeholder="empleado@email.com"></div>
      <div class="fg"><label class="fl">Contraseña</label><input class="fi" id="cc_pass" type="password" placeholder="Mín. 6 caracteres"></div>
      <div class="fg"><label class="fl">Rol</label>
        <select class="fi" id="cc_role" style="appearance:none">
          <option value="admin">👑 Administrador</option>
          <option value="viewer">👁 Solo lectura</option>
        </select>
      </div>
    </div>
    <div class="bsheet-foot">
      <button class="btn-sec" style="flex:1" onclick="closeBS()">Cancelar</button>
      <button class="btn-gold" style="flex:2" onclick="guardarCuenta()">Crear cuenta</button>
    </div>
    <div id="cc_err" style="display:none;margin:0 18px 8px;padding:8px 12px;background:rgba(240,82,82,.1);border:1px solid rgba(240,82,82,.3);border-radius:8px;font-size:12px;color:var(--danger)"></div>
    <div id="cc_ok" style="display:none;margin:0 18px 8px;padding:8px 12px;background:rgba(62,207,142,.1);border:1px solid rgba(62,207,142,.3);border-radius:8px;font-size:12px;color:var(--ok)"></div>
  `);
};
window.guardarCuenta=async()=>{
  const name=document.getElementById("cc_name")?.value?.trim();
  const email=document.getElementById("cc_email")?.value?.trim();
  const pass=document.getElementById("cc_pass")?.value;
  const role=document.getElementById("cc_role")?.value;
  const err=document.getElementById("cc_err"),ok=document.getElementById("cc_ok");
  err.style.display="none"; ok.style.display="none";
  if(!name||!email||!pass){err.textContent="Completá todos los campos";err.style.display="block";return;}
  if(pass.length<6){err.textContent="Contraseña mínimo 6 caracteres";err.style.display="block";return;}
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await set(ref(db,`nomina/${ROOM}/users/${cred.user.uid}`),{name,email,role,ts:Date.now()});
    ok.textContent=`✓ Cuenta creada para ${name}`;ok.style.display="block";
    ["cc_name","cc_email","cc_pass"].forEach(id=>{const el=document.getElementById(id);if(el)el.value="";});
  }catch(e){
    const m={"auth/email-already-in-use":"Ya existe una cuenta con ese email.","auth/weak-password":"Contraseña muy débil."};
    err.textContent=m[e.code]||"Error: "+e.message; err.style.display="block";
  }
};

// ══════════════════ BSHEET ══════════════════
function openBS(html){
  document.getElementById("bsheet-content").innerHTML=html;
  document.getElementById("bsheet-overlay").classList.add("open");
}
function closeBS(){ document.getElementById("bsheet-overlay").classList.remove("open"); }
function bsClickOut(e){ if(e.target===document.getElementById("bsheet-overlay")) closeBS(); }
window.openBS=openBS; window.closeBS=closeBS; window.bsClickOut=bsClickOut;

  openBS(`

    <div class="bsheet-body">
      <input class="fi" id="search-inp" placeholder="Nombre o cargo..." oninput="S.search=this.value;render()" autofocus>

  `);
};

// ══════════════════ EXPORT ══════════════════
window.exportCSV=()=>{
  const emps=S.employees.filter(e=>!e.hidden);
  const rows=[["Nombre","Género","Cargo","Sueldo Base","Días","Diario","Hora","Quincena","Mensual","Anual"]];
  emps.forEach(e=>{const c=calc(e);rows.push([e.name,e.gender==="F"?"F":"M",e.position||"",e.salary,e.diasTrab||30,Math.round(c.diario),Math.round(c.valorH),Math.round(c.qFinal),Math.round(c.bruto),e.salary*12]);});
  const csv=rows.map(r=>r.join(";")).join("\n");
  const a=document.createElement("a");
  a.href=URL.createObjectURL(new Blob(["\uFEFF"+csv],{type:"text/csv;charset=utf-8"}));
  a.download=`NOMINAAD_${MONTHS[S.viewM]}_${S.viewY}.csv`;
  a.click(); toast("✓ CSV exportado");
};

// ══════════════════ TOAST ══════════════════
function toast(msg){
  document.querySelectorAll(".toast").forEach(t=>t.remove());
  const t=document.createElement("div");
  t.className="toast"; t.textContent=msg;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(),3000);
}
window.toast=toast;
